        setStatus('Internal error: opponent reply illegal (' + uci + '). Solution data may be corrupt.', 'error');
        return;
      }
      // Animated update — default chessboard.js behavior, NOT onSnapEnd here.
      if (board) board.position(chess.fen());
      // Re-apply lastmove + check after the animation settles.
      applyLastMoveAndCheckDeferred(from, to);
      // If a 'complete' result carried an opp reply, the puzzle ended on
      // the opp's move — show completion UI now that the animation has run.
      if (pendingCompletionResult) {
        var pc = pendingCompletionResult;
        pendingCompletionResult = null;
        handleCompletion(pc);
      } else {
        setStatus('Your move.', 'info');
      }
    }

    function handleCompletion(result) {
      if (result.toRecord !== null) {
        Progress.recordReview(drillState.puzzleId, result.toRecord);
        // Card just rescheduled (Easy/Hard → days out, or Again-on-final
        // → tomorrow). Either way it's no longer due today.
        refreshReviewBadge();
      }
      var grade = drillState.gradeRecorded;
      var msg, kind;
      if (grade === FSRS.GRADE.again) {
        msg = '✗ Solved with errors — graded Again.';
        kind = 'error';
      } else if (grade === FSRS.GRADE.hard) {
        msg = '✓ Solved with a hint — graded Hard.';
        kind = 'warn';
      } else {
        msg = '✓ Solved cleanly — graded Easy.';
        kind = 'ok';
      }
      // Result text moves into the completion strip (between the controls
      // row and the global #status bar). The strip's Next-puzzle button
      // is shown only in session mode; single-puzzle drilling shows just
      // the result text. The #status bar gets a forward-looking hint
      // ("click Next" / "click Back") so it stays useful, not redundant.
      $('#completionText')
        .removeClass('ok warn error')
        .addClass(kind)
        .text(msg);
      $('#completionStrip').show();
      $('#hintBtn').prop('disabled', true);
      if (sessionState) {
        $('#nextPuzzleBtn').prop('disabled', false).show().focus();
        var exitLabel = (sessionState.kind === 'review') ? 'Exit review' : 'Exit session';
        setStatus('Click Next puzzle to continue, or ' + exitLabel + ' to stop.', 'info');
      } else {
        $('#nextPuzzleBtn').prop('disabled', true).hide();
        setStatus('Click Back to return to results.', 'info');
      }
      // Paint the green check on the FINAL solution move's destination.
      // Deferred (+250ms) survives chessboard.js's animated position()
      // DOM rebuild, same pattern as showLastMoveDeferred. Note: even
      // when grade===again we still show green — the FINAL move was
      // correct (otherwise the puzzle isn't complete). The grade text
      // in the strip carries the "you struggled" nuance; a red X on a
      // correct move would be misleading.
      var solution = drillState.solutionUci;
      var lastUci = solution[solution.length - 1];
      if (lastUci && lastUci.length >= 4) {
        showCompletionBadgeDeferred(lastUci.slice(2, 4));
      }
    }

    // ─── hint + back buttons ────────────────────────────────────────────
    function onHintClick() {
      if (!drillState || drillState.complete) return;
      var r = Drill.requestHint(drillState);
      drillState = r.state;
      if (r.hintInfo && r.hintInfo.fromSquare) {
        showHintFromSquare(r.hintInfo.fromSquare);
        setStatus('Hint: move from ' + r.hintInfo.fromSquare + '. (Caps grade at Hard.)', 'info');
      }
      // One-hint policy per project doc — don't escalate to level 2 (full
      // arrow). A second hint = solution.
      $('#hintBtn').prop('disabled', true);
    }

    function onBackClick() {
      if (oppReplyTimeout) {
        clearTimeout(oppReplyTimeout);
        oppReplyTimeout = null;
      }
      if (introTimeout) {
        clearTimeout(introTimeout);
        introTimeout = null;
      }
      pendingOppReply = null;
      pendingCompletionResult = null;
      var lastPid = drillPuzzle ? drillPuzzle.id : null;
      var hadSession = !!sessionState;
      var wasReview = !!(sessionState && sessionState.kind === 'review');
      drillState = null;
      drillPuzzle = null;
      sessionState = null;          // exit session if active
      mode = 'search';
      $('#drillPanel').hide();
      $('#completionStrip').hide();
      $('#searchPanel').show();
      // Result badges live on the board DOM, which rebuildSearchBoard
      // replaces wholesale below — but null the state vars explicitly
      // so a leftover ::after class doesn't survive a half-rebuilt DOM.
      clearCompletionBadge();
      clearWrongX();
      // Re-render the result list so a freshly-completed puzzle picks up
      // its ✓ Done badge (cheap — capped at MAX_RESULTS rows). Applies
      // in BOTH search-session and review-mode flows: if the user had a
      // prior search, restoring those results on exit beats dropping them
      // at an empty home state. The list is guarded by lastMatches.length
      // so an empty/no-prior-search state is also handled cleanly.
      if (lastMatches && lastMatches.length) {
        renderResults(lastMatches);
        $('#resultsMeta').show();
        $('#results').show();
        // Refresh slider counts (unsolved count may have decreased while
        // drilling). Don't reconfigure bounds — preserve user's range.
        updateSessionPanelUI();
      }
      rebuildSearchBoard();
      // The badge count drops as cards get graded during a review (or
      // get scheduled-out via first-wrong). Refresh on every back so the
      // header reflects current state regardless of how the drill ended.
      refreshReviewBadge();
      // Status message picks the most relevant line for what the user
      // is now looking at: prior-search results, prior session prompt,
      // or a clean home.
      var hasResults = !!(lastMatches && lastMatches.length);
      if (wasReview) {
        setStatus(
          hasResults
            ? 'Back to results.'
            : 'Set a position and click Search, or come back when more reviews are due.',
          'info'
        );
      } else if (hadSession) {
        setStatus('Adjust the range and start a new session, or pick a row.', 'info');
      } else if (lastPid) {
        setStatus('Back to results.', 'info');
      } else {
        setStatus('Set a position and click Search.', 'info');
      }
    }

    // ─── review-mode flow (issue #1) ────────────────────────────────────
    // The SRS layer (lib/fsrs.js + lib/progress.js) grades every drilled
    // puzzle and schedules a due date, but no UI surfaced due puzzles
    // until now. The "review queue" reuses the search-session machinery
    // (Session.advance / progress / the completion strip's Next button)
    // — only the queue source differs: a sorted id list from Progress
    // instead of a filtered match list from a search.
    //
    // Walk Progress entries, keep the due ones, sort oldest-due first
    // (tiebreak: oldest lastSeen first). srs.due is YYYY-MM-DD; lastSeen
    // is ISO. Both are lexicographic-sortable as strings.
    function getDuePuzzleIds() {
      var data;
      try { data = Progress.exportData(); }
      catch (e) { return []; }
      if (!data || !data.positions) return [];
      var ids = [];
      var todayStr = FSRS.localDateString(new Date());
      for (var pid in data.positions) {
        if (!Object.prototype.hasOwnProperty.call(data.positions, pid)) continue;
        if (!Progress.isDue(pid, todayStr)) continue;
        var entry = data.positions[pid];
        ids.push({
          id: pid,
          due: (entry && entry.srs && typeof entry.srs.due === 'string') ? entry.srs.due : '',
          lastSeen: (entry && typeof entry.lastSeen === 'string') ? entry.lastSeen : ''
        });
      }
      ids.sort(function (a, b) {
        if (a.due !== b.due) return a.due < b.due ? -1 : 1;
        if (a.lastSeen !== b.lastSeen) return a.lastSeen < b.lastSeen ? -1 : 1;
        return a.id < b.id ? -1 : (a.id > b.id ? 1 : 0);
      });
      var out = [];
      for (var i = 0; i < ids.length; i++) out.push(ids[i].id);
      return out;
    }

    // Refresh the header badge. Reads Progress.stats().due and either
    // shows "N due · review" or hides the pill entirely. Called on init,
    // after every recordReview, and on back-from-review (a session of
    // reviews drains the count).
    function refreshReviewBadge() {
      var n = 0;
      try { n = Progress.stats().due | 0; }
      catch (e) { n = 0; }
      var $b = $('#reviewBadge');
      if (n > 0) {
        $b.text(n + ' due · review').prop('hidden', false);
      } else {
        $b.prop('hidden', true).text('');
      }
    }

    // Click the badge → build the queue, install it as sessionState
    // (kind:'review'), drill the first puzzle. Reuses the search-session
    // race guard since both flows feed advanceSessionAndDrill, which is
    // also guarded.
    async function onReviewBadgeClick() {
      if (sessionLoading) return;
      // Don't start a review while already drilling/sessioning — the
      // badge is in the header so it stays clickable in any state.
      // Surface a short hint rather than silently no-oping.
      if (sessionState || drillState) {
        setStatus('Finish the current puzzle first, then start your review.', 'info');
        return;
      }
      var ids = getDuePuzzleIds();
      if (!ids.length) {
        // Race: badge was visible at click time but Progress changed
        // (cleared in another tab, e.g.). Hide and bail gracefully.
        refreshReviewBadge();
        setStatus('No reviews due right now.', 'info');
        return;
      }
      sessionState = Session.createFromIds(ids, { kind: 'review' });
      setStatus('Review started — ' + sessionState.total + ' puzzle' +
                (sessionState.total === 1 ? '' : 's') + ' due.', 'info');
      sessionLoading = true;
      try {
        await advanceSessionAndDrill();
      } finally {
        sessionLoading = false;
      }
    }

    // ─── session-mode flow ──────────────────────────────────────────────
    // Start session: build a queue from the current matches + slider range,
    // then drill the first puzzle. Body-fetch failure exits the session
    // with a setStatus error (the body shard's missing → can't recover
    // without rebuilding data).
    async function onStartSessionClick() {
      if (sessionLoading) return;            // race guard, see decl
      if (!lastMatches || !lastMatches.length) return;
      var rmin = +$('#ratingMin').val();
      var rmax = +$('#ratingMax').val();
      var s = Session.create({
        matches: lastMatches,
        ratingMin: rmin,
        ratingMax: rmax,
        isCompleted: Progress.isCompleted
      });
      if (s.complete) {
        // Defensive — start button should be disabled in this state.
        setStatus('No unsolved puzzles in that range.', 'warn');
        return;
      }
      sessionState = s;
      setStatus('Session started — ' + s.total + ' unsolved puzzle' +
                (s.total === 1 ? '' : 's') + ' queued.', 'info');
      sessionLoading = true;
      try {
        await advanceSessionAndDrill();
      } finally {
        sessionLoading = false;
      }
    }

    // Next-puzzle: advance the session cursor; either drill the next id
    // or transition to the session-complete state. Guarded against
    // double-clicks via sessionLoading (the disabled-attribute alone is
    // unreliable — see the var's declaration comment).
    async function onNextPuzzleClick() {
      if (sessionLoading) return;
      if (!sessionState || sessionState.complete) return;
      $('#nextPuzzleBtn').prop('disabled', true);
      sessionLoading = true;
      try {
        await advanceSessionAndDrill();
      } finally {
        sessionLoading = false;
      }
    }

    async function advanceSessionAndDrill() {
      var r = Session.advance(sessionState);
      sessionState = r.state;
      if (r.exhausted) {
        onSessionComplete();
        return;
      }
      var ok = await startDrillByPuzzleId(r.puzzleId);
      if (!ok) {
        // Body fetch / parse failed; status already set by startDrill.
        // Bail out of the session — re-trying the same id won't help
        // and re-advancing would silently skip a puzzle. Restore the
        // single-puzzle Back button styling so the user sees a clear
        // exit (the previous puzzle's board may still be visible).
        var wasReview = (sessionState && sessionState.kind === 'review');
        sessionState = null;
        $('#sessionProgress').hide();
        $('#completionStrip').hide();
        $('#nextPuzzleBtn').hide();
        // In review mode there's no result list to return to — Back
        // closes the drill panel and drops the user at search-mode home.
        $('#backBtn').addClass('primary').text(wasReview ? 'Done' : 'Back to results');
      }
    }

    // Session exhausted: show the completion message, repurpose the
    // progress label as a success banner, hide Next, and let the user
    // exit via Back. We deliberately keep the last puzzle's board state
    // visible — feels like a natural "rest" state. Restore the Back
    // button to "Back to results" since the session is now done; the
    // "Exit session" / "Exit review" label was for the in-progress case.
    function onSessionComplete() {
      var total = sessionState ? sessionState.total : 0;
      var isReview = !!(sessionState && sessionState.kind === 'review');
      var bannerLead = isReview ? '✓ Review complete — ' : '✓ Session complete — ';
      var bannerTail = isReview
        ? (' puzzle' + (total === 1 ? '' : 's') + ' reviewed')
        : (' puzzle' + (total === 1 ? '' : 's') + ' cleared');
      $('#sessionProgress')
        .addClass('complete')
        .text(bannerLead + total + bannerTail)
        .show();
      $('#nextPuzzleBtn').prop('disabled', true).hide();
      $('#hintBtn').prop('disabled', true);
      $('#backBtn').addClass('primary').text(isReview ? 'Done' : 'Back to results');
      var statusMsg = isReview
        ? 'All due reviews cleared. Click Done to return.'
        : 'All unsolved puzzles in range cleared. Back to results to start another session.';
      setStatus(statusMsg, 'ok');
    }

    // ─── right-click annotations (issue #3) ─────────────────────────────
    // SVG overlay drawn in lockstep with the board. Re-renders are cheap
    // (~6 SVG nodes max in typical use) so we just rebuild innerHTML on
    // every state change rather than tracking diffs.
    var DRAW_COLORS = {
      green:  { arrow: 'rgba(21, 120, 27, 0.7)',  circle: 'rgba(21, 120, 27, 0.85)' },
      red:    { arrow: 'rgba(175, 30, 30, 0.7)',  circle: 'rgba(175, 30, 30, 0.85)' },
      blue:   { arrow: 'rgba(40, 100, 220, 0.7)', circle: 'rgba(40, 100, 220, 0.85)' },
      yellow: { arrow: 'rgba(200, 180, 0, 0.7)',  circle: 'rgba(200, 180, 0, 0.85)' }
    };

    // Lichess convention: default=green, Shift=red, Alt=blue,
    // Shift+Alt=yellow. We also fold in Ctrl/Meta as Shift-equivalents
    // for users on layouts where Shift is awkward, matching MistakeLab.
    function getDrawColor(e) {
      var shift = !!(e.shiftKey || e.ctrlKey || e.metaKey);
      var alt   = !!e.altKey;
      if (shift && alt) return 'yellow';
      if (alt)          return 'blue';
      if (shift)        return 'red';
      return 'green';
    }

    // Map a mouse event's clientX/Y to a square name, accounting for
    // board orientation. Returns null if the event is off-board (which
    // happens routinely during a drag — the drag can leave the rect).
    // chessboard.js sets data-square on every square element, but using
    // it from a mousemove event isn't reliable (the SVG sits over the
    // board and even with pointer-events:none, the cursor's e.target is
    // the SVG). Bounding-box math is faster anyway.
    function getSquareFromMouseEvent(e) {
      var boardEl = document.querySelector('#board [class^="board-"]');
      if (!boardEl || !board) return null;
      var rect = boardEl.getBoundingClientRect();
      var x = e.clientX - rect.left;
      var y = e.clientY - rect.top;
      if (x < 0 || y < 0 || x > rect.width || y > rect.height) return null;
      var sqSize = rect.width / 8;
      var fileIdx = Math.floor(x / sqSize);
      var rankIdx = Math.floor(y / sqSize);
      var isWhite = board.orientation() === 'white';
      var file = isWhite ? String.fromCharCode(97 + fileIdx) : String.fromCharCode(104 - fileIdx);
      var rank = isWhite ? (8 - rankIdx) : (1 + rankIdx);
      return file + rank;
    }

    // Anything currently on screen?
    function hasAnyAnnotations() {
      return activeArrows.size > 0 || activeCircles.size > 0 ||
             ghostArrow !== null || ghostCircle !== null;
    }

    // Wipe all annotations (called on move played, board re-init, Esc).
    // Doesn't touch the in-flight gesture state — if the user is mid-
    // right-click the next mouseup still completes correctly. (For move-
    // played callers this won't matter; the user can't be drawing AND
    // making a move at the same time.)
    function clearAnnotations() {
      activeArrows.clear();
      activeCircles.clear();
      ghostArrow = null;
      ghostCircle = null;
      ghostCircleWasColor = null;
      renderAnnotations();
    }

    function renderAnnotations() {
      var svg = document.getElementById('annotationLayer');
      if (!svg) return;
      var boardEl = document.querySelector('#board [class^="board-"]');
      if (!boardEl) {
        // Board not built yet — nothing to render against.
        svg.classList.add('hidden');
        svg.innerHTML = '';
        return;
      }
      if (!hasAnyAnnotations()) {
        svg.classList.add('hidden');
        svg.innerHTML = '';
        return;
      }

      // Pin SVG to the board's exact rect within the wrapper. Read both
      // rects each render — the board may have resized (window resize,
      // mode swap, etc.) and chessboard.js doesn't notify us.
      var boardRect = svg.parentElement.querySelector('#board')
        ? boardEl.getBoundingClientRect() : null;
      if (!boardRect) {
        svg.classList.add('hidden');
        return;
      }
      var wrapRect = svg.parentElement.getBoundingClientRect();
      svg.style.left = (boardRect.left - wrapRect.left) + 'px';
      svg.style.top  = (boardRect.top  - wrapRect.top ) + 'px';
      svg.style.width  = boardRect.width + 'px';
      svg.style.height = boardRect.height + 'px';
      svg.setAttribute('viewBox', '0 0 ' + boardRect.width + ' ' + boardRect.height);
      svg.classList.remove('hidden');

      var sqSize = boardRect.width / 8;
      var shaftWidth = sqSize * 0.18;
      var headWidth  = shaftWidth * 3.5;
      var headLength = headWidth * 0.75;

      // Resolve a square name to its center within the SVG's coordinate
      // system. Read live from the DOM rather than computing — robust
      // against any stray padding/border chessboard.js might apply.
      function sqCenter(sq) {
        var el = document.querySelector('[data-square="' + sq + '"]');
        if (!el) return null;
        var r = el.getBoundingClientRect();
        return {
          x: r.left - boardRect.left + r.width / 2,
          y: r.top  - boardRect.top  + r.height / 2
        };
      }

      var html = '';
      function drawArrow(from, to, color, opacity) {
        var s = sqCenter(from);
        var e = sqCenter(to);
        if (!s || !e) return;
        var angle = Math.atan2(e.y - s.y, e.x - s.x);
        // 0.1px overlap between shaft and head closes the AA seam at the
        // join. Without it, semi-transparent arrows show a hairline gap.
        var overlap = 0.1;
        var shaftEndX = e.x - (headLength - overlap) * Math.cos(angle);
        var shaftEndY = e.y - (headLength - overlap) * Math.sin(angle);
        var p1x = e.x, p1y = e.y;
        var p2x = e.x - headLength * Math.cos(angle) + (headWidth / 2) * Math.sin(angle);
        var p2y = e.y - headLength * Math.sin(angle) - (headWidth / 2) * Math.cos(angle);
        var p3x = e.x - headLength * Math.cos(angle) - (headWidth / 2) * Math.sin(angle);
        var p3y = e.y - headLength * Math.sin(angle) + (headWidth / 2) * Math.cos(angle);
        html += '<g opacity="' + opacity + '">' +
                  '<line x1="' + s.x + '" y1="' + s.y + '" ' +
                       'x2="' + shaftEndX + '" y2="' + shaftEndY + '" ' +
                       'stroke="' + color + '" stroke-width="' + shaftWidth + '" ' +
                       'stroke-linecap="butt" />' +
                  '<polygon points="' + p1x + ',' + p1y + ' ' +
                                       p2x + ',' + p2y + ' ' +
                                       p3x + ',' + p3y + '" ' +
                          'fill="' + color + '" />' +
                '</g>';
      }
      function drawCircle(sq, color, opacity, strokeMul) {
        var c = sqCenter(sq);
        if (!c) return;
        var radius = sqSize * 0.46;
        var stroke = sqSize * 0.056 * (strokeMul || 1);
        html += '<circle cx="' + c.x + '" cy="' + c.y + '" r="' + radius + '" ' +
                       'fill="none" stroke="' + color + '" ' +
                       'stroke-width="' + stroke + '" ' +
                       'opacity="' + opacity + '" />';
      }

      // User-committed arrows
      activeArrows.forEach(function (color, key) {
        var c = DRAW_COLORS[color] || DRAW_COLORS.green;
        drawArrow(key.substring(0, 2), key.substring(2, 4), c.arrow, 1);
      });
      // Ghost arrow (preview during right-click drag)
      if (ghostArrow) {
        var gc = DRAW_COLORS[currentDrawColor] || DRAW_COLORS.green;
        drawArrow(ghostArrow.from, ghostArrow.to, gc.arrow, 0.6);
      }
      // User-committed circles
      activeCircles.forEach(function (color, sq) {
        var c = DRAW_COLORS[color] || DRAW_COLORS.green;
        drawCircle(sq, c.circle, 0.9, 1);
      });
      // Ghost circle (preview during right-click hold before drag)
      if (ghostCircle) {
        var gc2 = DRAW_COLORS[currentDrawColor] || DRAW_COLORS.green;
        drawCircle(ghostCircle, gc2.circle, 0.5, 0.7);
      }

      svg.innerHTML = html;
    }

    // ─── square highlights ──────────────────────────────────────────────
    // chessboard.js v1 tags each square with .square-XX (algebraic, e.g.
    // .square-e4), .square-55d63 (the obfuscated lib class), and exposes
    // data-square="XX" on the same element for event-target lookup. The
    // CSS uses ::before/::after overlays (per-square `isolation: isolate`)
    // so highlights stack cleanly with the piece <img>. Patterns derived
    // from MistakeLab.
    function $square(sq) { return $('#board .square-' + sq); }

    // ── Last move (Lichess-style green, persistent until next move) ──
    function showLastMove(from, to) {
      clearLastMove();
      if (!from || !to) return;
      $square(from).addClass('square-lastmove');
      $square(to).addClass('square-lastmove');
    }
    function clearLastMove() {
      $('#board .square-lastmove').removeClass('square-lastmove');
    }
    // Re-apply at +250ms because chessboard.js's animated position(fen)
    // rebuilds DOM at animation completion, wiping our classes.
    function showLastMoveDeferred(from, to) {
      showLastMove(from, to);
      setTimeout(function () { showLastMove(from, to); }, 250);
    }

    // ── Check / checkmate aura on the king's square ──
    function findKingSquare(c, color) {
      // chess.js v0.10 board(): 8x8 array, rank 8 → rank 1, file a → file h.
      if (!c || typeof c.board !== 'function') return null;
      var grid = c.board();
      for (var r = 0; r < 8; r++) {
        var row = grid[r];
        if (!row) continue;
        for (var f = 0; f < 8; f++) {
          var p = row[f];
          if (p && p.type === 'k' && p.color === color) {
            return String.fromCharCode(97 + f) + (8 - r);
          }
        }
      }
      return null;
    }
    function showCheck(c) {
      clearCheck();
      if (!c || typeof c.in_check !== 'function') return;
      if (!c.in_check() && !c.in_checkmate()) return;
      var sq = findKingSquare(c, c.turn());
      if (!sq) return;
      $square(sq).addClass(c.in_checkmate() ? 'square-checkmate' : 'square-check');
    }
    function clearCheck() {
      $('#board .square-check, #board .square-checkmate')
        .removeClass('square-check square-checkmate');
    }
    function showCheckDeferred(c) {
      showCheck(c);
      setTimeout(function () { showCheck(c); }, 250);
    }
    // Convenience: paint lastmove + check together with the same animation
    // settling delay. Used after every animated board update. Also clears
    // any drawn annotations — a move played invalidates the position the
    // arrows were drawn on, so they shouldn't survive (issue #3).
    function applyLastMoveAndCheckDeferred(from, to) {
      if (hasAnyAnnotations()) clearAnnotations();
      showLastMoveDeferred(from, to);
      showCheckDeferred(chess);
    }

    // ── Click-to-move selection + legal-move dots ──
    function selectSquare(sq) {
      // Clear wrong-X first — both wrong-X and legal-dot/capture use
      // ::after, and if the wrong-X target is also a legal target of
      // the new selection, the cascade order would resolve unpredictably.
      // Clearing wrong-X before painting dots makes the legal-dot win
      // cleanly and signals "you're starting a new attempt".
      clearWrongX();
      selectedSquare = sq;
      $square(sq).addClass('square-selected');
      // Show legal-move dots / capture corners for every legal target.
      // chess.js v0.10 verbose moves include `flags` ('e' = en passant
      // capture, 'c' = capture, etc.) and `to`. Empty target → dot;
      // capture (incl. EP) → corner triangles.
      if (!chess) return;
      var moves;
      try { moves = chess.moves({ square: sq, verbose: true }); }
      catch (e) { return; }
      for (var i = 0; i < moves.length; i++) {
        var mv = moves[i];
        var $t = $square(mv.to);
        if (!$t.length) continue;
        var captured = chess.get(mv.to);
        if (captured || (mv.flags && mv.flags.indexOf('e') !== -1)) {
          $t.addClass('square-legal-capture');
        } else {
          $t.addClass('square-legal-dot');
        }
      }
    }
    function clearSelection() {
      selectedSquare = null;
      $('#board .square-selected, #board .square-legal-dot, #board .square-legal-capture')
        .removeClass('square-selected square-legal-dot square-legal-capture');
    }

    // ── Hint + wrong-move flash ──
    function showHintFromSquare(sq) {
      clearHintHighlight();
      $square(sq).addClass('square-hint');
    }
    function clearHintHighlight() {
      $('#board .square-hint').removeClass('square-hint');
    }
    // Wrong-move flash: add square-wrong, animation handles fade, remove
    // class after it finishes so a subsequent flash on the same square
    // retriggers cleanly.
    function flashWrong(square) {
      var $sq = $square(square);
      $sq.addClass('square-wrong');
      setTimeout(function () { $sq.removeClass('square-wrong'); }, 650);
    }

    // ── Result badges (Lichess-style) ──
    // Green check on the puzzle's last move at completion; red X on a
    // wrong attempt's target. Both use ::after, so they conflict with
    // legal-move dots/triangles — the order of operations (clearWrongX
    // at start of selectSquare/attemptMove) ensures wrong-x is gone
    // before any legal-dot paint runs. square-correct only paints at
    // completion when no selection is active.
    var completionBadgeTimer = null;
    function showCompletionBadge(square) {
      clearCompletionBadge();
      if (!square) return;
      $square(square).addClass('square-correct');
    }
    // Cancels the pending reapply timer too — without that, a Back-click
    // within the 250ms window would clear the class, then the timer
    // would fire and re-add the class to whatever element happens to
    // match `.square-{sq}` in the now-rebuilt search board, leaving a
    // stray green check on an unrelated square.
    function clearCompletionBadge() {
      if (completionBadgeTimer) {
        clearTimeout(completionBadgeTimer);
        completionBadgeTimer = null;
      }
      $('#board .square-correct').removeClass('square-correct');
    }
    // Deferred reapply (+250ms) survives chessboard.js's animated
    // position() DOM rebuild — same pattern as showLastMoveDeferred.
    function showCompletionBadgeDeferred(square) {
      showCompletionBadge(square);
      completionBadgeTimer = setTimeout(function () {
        completionBadgeTimer = null;
        showCompletionBadge(square);
      }, 250);
    }

    function paintWrongX(square) {
      if (!square) return;
      // Don't clear first — flashWrong's wash and the X badge can co-exist;
      // the wash fades over 650ms, the X persists until next attempt.
      $square(square).addClass('square-wrong-x');
    }
    function clearWrongX() {
      $('#board .square-wrong-x').removeClass('square-wrong-x');
    }

    // ── Click-to-move event handlers ──
    // Click logic runs in mousedown (capture phase) so it fires BEFORE
    // chessboard.js's own mousedown handler. This lets us preventDefault
    // on a destination click (suppressing chessboard.js from starting a
    // drag on the enemy piece) while still letting normal drags begin
    // when the user actually drags from a piece.
    //
    //   - mousedown on own piece (no selection):  selectSquare. Don't
    //     preventDefault — chessboard.js may start a drag on movement.
    //   - mousedown on already-selected square:   set deselectionPending,
    //     fall through (allow drag if user moves).
    //   - mousedown on a different own piece:     reselect, fall through
    //     (allow drag on the new piece).
    //   - mousedown on a destination (empty/enemy with selection):
    //     preventDefault + stopPropagation, attempt the move, animate.
    //
    // mouseup w/o drag honors deselectionPending. onDragStart clears
    // deselectionPending so a drag committed from the selected piece
    // doesn't deselect on the trailing mouseup.
    function onBoardMouseDown(e) {
      if (!chess) return;
      if (mode !== 'drill' && mode !== 'search') return;

      // Right-click → start a draw gesture (issue #3). Right-click only:
      // middle-click (button 1) on a Mac trackpad or trackball is most
      // often a misclick for browser back, not an intentional draw.
      // Handled BEFORE the drill-mode turn gating below, since drawing
      // arrows during the opponent's reply window is exactly what users
      // want (e.g. marking a tactical idea while watching the reply).
      // Per issue: do NOT clear the click-to-move selection — selection-
      // clear by right-click is non-standard and users complained about
      // it. Mid-drag the SVG paints a ghost arrow / circle; mouseup
      // commits it via onBoardMouseUp (this same module).
      if (e.button === 2) {
        // Reset any stale gesture state. If a previous right-click was
        // released outside the window (or while the tab was inactive),
        // mouseup may never have fired and isRightClicking could be
        // stuck true. Clearing here ensures a clean start.
        if (isRightClicking) {
          ghostArrow = null;
          ghostCircle = null;
          if (ghostCircleWasColor && arrowStartSquare) {
            // Restore a circle that was lifted into ghost state by the
            // stuck gesture, otherwise it'd vanish silently.
            activeCircles.set(arrowStartSquare, ghostCircleWasColor);
          }
          ghostCircleWasColor = null;
          arrowStartSquare = null;
        }
        // Suppress chessboard.js drag tracking on whatever piece is under
        // the cursor — we don't want a right-click on an own piece to
        // start a drag-and-drop. chessboard.js binds on mousedown without
        // a button filter, so without this it'd start a drag we'd never
        // resolve.
        e.stopPropagation();
        if (e.preventDefault) e.preventDefault();
        isRightClicking = true;
        var rsqEl = (e.target && e.target.closest) ? e.target.closest('[data-square]') : null;
        var rsq = rsqEl ? rsqEl.getAttribute('data-square') : null;
        if (!rsq) {
          // Click landed off any square (notation label, padding). Treat
          // as a no-op draw start; mouseup with arrowStartSquare === null
          // does nothing.
          return;
        }
        arrowStartSquare = rsq;
        ghostArrow = null;
        currentDrawColor = getDrawColor(e);
        // If the square already has a circle, lift it into ghost state
        // so the user sees a preview of "if you mouseup here, this
        // circle will be removed" (or replaced). Mouseup logic resolves.
        ghostCircleWasColor = activeCircles.has(rsq) ? activeCircles.get(rsq) : null;
        if (ghostCircleWasColor) activeCircles.delete(rsq);
        ghostCircle = rsq;
        renderAnnotations();
        return;
      }

      // Left-click — drill mode adds gating now that right-click is
      // already handled. Drill-state / turn checks block move attempts
      // during the intro pause and opp-reply window. Search mode lets
      // either side move freely.
      if (mode === 'drill') {
        if (!drillState || drillState.complete) return;
        if (chess.turn() !== Drill.userColor(drillState)) return;
      }

      // Left-click on the board clears any drawn annotations (Lichess
      // convention). Always — selection-pending or not, square or not.
      // The clear is cheap (innerHTML='' + Map.clear()) and matches what
      // users expect: "I'm starting a new interaction, get rid of the
      // arrows from the last one".
      if (hasAnyAnnotations()) clearAnnotations();

      // Locate the square element under the event target.
      var t = e.target;
      if (!t || !t.closest) return;
      var sqEl = t.closest('[data-square]');
      if (!sqEl) return;
      var sq = sqEl.getAttribute('data-square');
      if (!sq) return;

      var turn = chess.turn();
      var piece = chess.get(sq);

      if (selectedSquare) {
        if (sq === selectedSquare) {
          // Click on the already-selected square. Defer the actual deselect
          // to mouseup so a drag-from-selected keeps the highlight visible.
          deselectionPending = true;
          return;
        }
        // Reselect on click of another own piece. Don't preventDefault —
        // user might drag the new piece.
        if (piece && piece.color === turn) {
          clearSelection();
          selectSquare(sq);
          return;
        }
        // Destination square (empty or enemy) → execute the move.
        // Suppress chessboard.js's drag tracking on the destination piece.
        e.stopPropagation();
        if (e.preventDefault) e.preventDefault();
        var fromSq = selectedSquare;
        // Clear selection FIRST — matches MistakeLab. A click on any
        // non-legal target (empty square not in the legal-move set, an
        // own-piece-blocked square, etc.) should deselect, with no move
        // attempted. attemptMove returns ok:false on illegal, in which
        // case we just leave the selection cleared.
        clearSelection();
        var r = attemptMove(fromSq, sq);
        if (r && r.ok && !r.wrong) {
          // chessboard.js wasn't involved in this move — animate it manually
          // and paint the lastmove + check highlights.
          if (board) board.position(chess.fen());
          applyLastMoveAndCheckDeferred(r.from, r.to);
          // Click-move applies the highlight directly; null the var so a
          // subsequent drag's onSnapEnd doesn't re-paint stale coords.
          lastSuccessfulUserMove = null;
          // onSnapEnd doesn't fire for board.position calls — schedule the
          // opp reply ourselves (drill mode only; search mode leaves
          // pendingOppReply null, so this no-ops).
          scheduleOppReplyIfPending();
        }
        // Illegal: chess.js never advanced; selection already cleared.
        // Wrong:   chess.undo() reverted; selection cleared above.
        return;
      }
      // No selection — select if the click landed on an own-color piece.
      if (piece && piece.color === turn) {
        selectSquare(sq);
      }
    }

    function onBoardMouseUp(e) {
      // Right-click release → commit the in-progress annotation. Note:
      // the right-click might end on a square that's NOT under the
      // original click (the user dragged), or off-board entirely. We
      // bind this on the board element AND on window (see init), so a
      // release outside the board still resolves the gesture.
      if (e && e.button === 2 && isRightClicking) {
        var endSq = getSquareFromMouseEvent(e);
        if (arrowStartSquare && endSq && endSq !== arrowStartSquare) {
          // Drag from start → end. Toggle: same color same key removes;
          // anything else replaces.
          var key = arrowStartSquare + endSq;
          if (activeArrows.has(key) && activeArrows.get(key) === currentDrawColor) {
            activeArrows.delete(key);
          } else {
            activeArrows.set(key, currentDrawColor);
          }
        } else if (arrowStartSquare && endSq && endSq === arrowStartSquare) {
          // Same-square click → toggle a circle. If the square already
          // had a circle of the SAME color, the mousedown branch lifted
          // it into ghost state (i.e. activeCircles already lacks it),
          // and we want to leave it removed. If it had a DIFFERENT color,
          // ghostCircleWasColor is set and we replace with the new color.
          // If there was no prior circle, just add the new one.
          if (ghostCircleWasColor && ghostCircleWasColor === currentDrawColor) {
            // Confirm removal — do nothing, the lift in mousedown stays.
          } else {
            activeCircles.set(endSq, currentDrawColor);
          }
        } else if (arrowStartSquare && !endSq) {
          // Released off-board. Cancel cleanly — restore any pre-existing
          // circle that was lifted into ghost on mousedown.
          if (ghostCircleWasColor) {
            activeCircles.set(arrowStartSquare, ghostCircleWasColor);
          }
        }
        arrowStartSquare = null;
        ghostArrow = null;
        ghostCircle = null;
        ghostCircleWasColor = null;
        isRightClicking = false;
        renderAnnotations();
        return;
      }

      // Left-click release: original deselection-pending logic.
      if (deselectionPending) {
        deselectionPending = false;
        clearSelection();
      }
    }

    // Window-level mousemove so a drag that strays off-board still
    // updates the ghost arrow. mousemove fires every frame during a
    // drag, but renderAnnotations is cheap enough (innerHTML rewrite of
    // ≤6 nodes) that we don't bother throttling.
    function onWindowMouseMove(e) {
      if (!isRightClicking || !arrowStartSquare) return;
      var cur = getSquareFromMouseEvent(e);
      if (cur && cur !== arrowStartSquare) {
        // Dragged onto a different square → arrow takes over from the
        // ghost circle. If a pre-existing circle was lifted into ghost
        // state on mousedown, restore it now (so cancelling the drag
        // by releasing on the start doesn't lose the original circle).
        if (ghostCircle) {
          ghostCircle = null;
          if (ghostCircleWasColor) activeCircles.set(arrowStartSquare, ghostCircleWasColor);
        }
        if (!ghostArrow || ghostArrow.from !== arrowStartSquare || ghostArrow.to !== cur) {
          ghostArrow = { from: arrowStartSquare, to: cur };
          renderAnnotations();
        }
      } else if (cur && cur === arrowStartSquare && ghostArrow) {
        // Dragged back to the start square → arrow goes away, restore
        // the ghost-circle preview (and re-lift any pre-existing
        // circle, mirroring mousedown).
        ghostArrow = null;
        if (ghostCircleWasColor) activeCircles.delete(arrowStartSquare);
        ghostCircle = arrowStartSquare;
        renderAnnotations();
      }
    }

    function setStatus(msg, kind) {
      $('#status').text(msg).attr('data-kind', kind || 'info');
    }

    // Build a Lichess analysis URL for a puzzle (issue #4).
    // Lichess's /analysis/<FEN> route accepts the FEN directly in the
    // URL path: slashes between rank rows are kept literal (path-legal),
    // and the metadata after the board (side-to-move, castling, EP,
    // halfmove, fullmove) gets URL-encoded. Adds ?color=white|black so
    // the orientation matches the user's perspective in the puzzle.
    // Returns '#' if the FEN is missing/invalid — caller sets the href
    // every time enterDrillMode runs, so a bad URL never lingers.
    //
    // We do NOT include the solution moves: Lichess's URL flow can't
    // carry both a starting FEN and inline PGN in a single request.
    // /analysis/pgn/<...> rejects [FEN ...] headers in the path (lila
    // #16286), and there's no ?pgn= query param (lila #10205, still
    // open as of writing). Engine evaluation works on whatever position
    // loads — the moves the user just played are fresh in their head,
    // and they'll typically want to explore alternatives anyway. So
    // FEN-only is the right MVP and honest about what Lichess supports.
    function buildLichessAnalysisUrl(puzzle) {
      if (!puzzle || typeof puzzle.fen !== 'string' || !puzzle.fen) return '#';
      var fen = puzzle.fen.trim();
      // FEN has six space-separated fields. The board portion (parts[0])
      // contains rank slashes that must stay LITERAL in the URL path —
      // encoding them as %2F may or may not be canonicalized by the
      // server, and the working examples in Lichess's own forum threads
      // (#36, #34) all use literal slashes. So we encode each rank
      // segment INDIVIDUALLY (which never contains a slash) and rejoin
      // with '/', then encodeURIComponent the metadata fields. The
      // whole thing joins with %20 between FEN fields.
      //   board:    rank/rank/rank/.../rank   ← slashes literal
      //   metadata: side, castling, EP, halfmove, fullmove
      var parts = fen.split(/\s+/);
      if (!parts.length) return '#';
      var board = parts[0].split('/').map(encodeURIComponent).join('/');
      var meta = parts.slice(1).map(encodeURIComponent);
      var encoded = [board].concat(meta).join('%20');
      var side = (parts[1] === 'b') ? 'black' : 'white';
      return 'https://lichess.org/analysis/' + encoded + '?color=' + side;
    }

    // ─── user FEN presets (issue #2) ────────────────────────────────────
    // localStorage-backed list of {name, fen} the user can save and recall.
    // Stored as a JSON array; insertion order is presentation order
    // (newest at the end). Defensive against corrupt JSON / quota /
    // private-mode failures, same pattern as lib/progress.js. The
    // hardcoded .example-btn presets above are NOT touched by this
    // feature — they're uneditable defaults.
    var PRESETS_STORAGE_KEY = 'puzzle_explorer_presets';
    var PRESET_NAME_MAX = 60;
    var PRESET_NAME_MIN = 1;

    function _presetsStorage() {
      // Wrap localStorage access. Browsers in incognito sometimes throw
      // on the property access itself (Safari historically); guard at
      // the call site. Returns null when storage isn't usable.
      try { return window.localStorage || null; } catch (e) { return null; }
    }
    function loadUserPresets() {
      var s = _presetsStorage();
      if (!s) return [];
      var raw;
      try { raw = s.getItem(PRESETS_STORAGE_KEY); } catch (e) { return []; }
      if (!raw) return [];
      var parsed;
      try { parsed = JSON.parse(raw); } catch (e) { return []; }
      if (!Array.isArray(parsed)) return [];
      // Filter to well-formed entries — drop anything corrupt rather
      // than throwing. A surviving partial list is more useful than a
      // hard-error page on first load.
      var out = [];
      for (var i = 0; i < parsed.length; i++) {
        var e = parsed[i];
        if (!e || typeof e !== 'object') continue;
        if (typeof e.name !== 'string' || typeof e.fen !== 'string') continue;
        if (!e.name || !e.fen) continue;
        out.push({ name: e.name, fen: e.fen });
      }
      return out;
    }
    function saveUserPresets(list) {
      var s = _presetsStorage();
      if (!s) return false;
      try { s.setItem(PRESETS_STORAGE_KEY, JSON.stringify(list)); return true; }
      catch (e) {
        // Quota exceeded / private-mode write failure. Surface a status
        // line so the user knows why their save didn't stick rather
        // than letting the row silently fail to update.
        setStatus('Could not save preset — browser storage is full or unavailable.', 'error');
        return false;
      }
    }

    function renderUserPresets() {
      var list = loadUserPresets();
      var $row = $('#userPresetsRow').empty();
      if (!list.length) { $row.prop('hidden', true); return; }
      $row.prop('hidden', false);
      for (var i = 0; i < list.length; i++) {
        var p = list[i];
        var $wrap = $('<span class="preset"></span>');
        // Use jQuery .text() / .data() / .attr() for both children — never
        // string-concat user-supplied names into HTML. Names go through
        // window.prompt() but defense in depth still matters since the
        // store could be modified via devtools or restored from a corrupt
        // export later.
        var $face = $('<button type="button" class="preset-face"></button>')
          .text(p.name)
          .attr('title', p.name + '  ·  ' + p.fen)
          .data('fen', p.fen);
        var $del = $('<button type="button" class="preset-del">×</button>')
          .attr('aria-label', 'Delete preset ' + p.name)
          .attr('data-preset-name', p.name);
        $wrap.append($face).append($del);
        $row.append($wrap);
      }
    }

    function onSavePresetClick() {
      // Use the applied position (chess.fen()), not whatever's typed in
      // the textarea. Matches example-btn semantics: user must Apply
      // first if they want to save typed-but-not-committed FEN.
      if (!chess) {
        setStatus('Board not ready yet — try again in a moment.', 'warn');
        return;
      }
      var fen;
      try { fen = chess.fen(); } catch (e) { fen = ''; }
      if (!fen) {
        setStatus('Could not read the current position.', 'error');
        return;
      }
      // Defensive: chess.js always emits a valid FEN, but cheap to check.
      var verify = new Chess();
      if (!verify.load(fen)) {
        setStatus('Current position is invalid — cannot save.', 'error');
        return;
      }

      var existing = loadUserPresets();
      var raw = window.prompt('Name this position:');
      if (raw === null) return;                  // user cancelled
      var name = raw.trim();
      if (name.length < PRESET_NAME_MIN) {
        setStatus('Preset name cannot be empty.', 'warn');
        return;
      }
      if (name.length > PRESET_NAME_MAX) {
        setStatus('Preset name too long (' + name.length + ' chars; max ' + PRESET_NAME_MAX + ').', 'warn');
        return;
      }
      // Case-insensitive duplicate check. A user expecting "London" to
      // be distinct from "london" is more confusing than helpful here.
      var lower = name.toLowerCase();
      for (var i = 0; i < existing.length; i++) {
        if (existing[i].name.toLowerCase() === lower) {
          setStatus('A preset named "' + existing[i].name + '" already exists.', 'warn');
          return;
        }
      }

      existing.push({ name: name, fen: fen });
      if (!saveUserPresets(existing)) return;    // status set by saveUserPresets
      renderUserPresets();
      setStatus('Saved preset "' + name + '".', 'ok');
    }

    function deleteUserPreset(name) {
      var list = loadUserPresets();
      var idx = -1;
      for (var i = 0; i < list.length; i++) {
        if (list[i].name === name) { idx = i; break; }
      }
      if (idx === -1) {
        // Name vanished between render and click (corrupt store, or
        // another tab edited storage). Just re-render and bail.
        renderUserPresets();
        return;
      }
      if (!window.confirm('Delete preset "' + name + '"?')) return;
      list.splice(idx, 1);
      if (!saveUserPresets(list)) return;
      renderUserPresets();
      setStatus('Deleted preset "' + name + '".', 'info');
    }

    async function loadDatasetInfo() {
      try {
        var res = await fetch(DATA_BASE_URL + 'meta.json');
        if (!res.ok) {
          $('#datasetInfo').text('no dataset (run analyzer)');
          return;
        }
        var meta = await res.json();
        var built = meta.builtAt ? new Date(meta.builtAt).toISOString().slice(0, 10) : '?';
        var n = meta.puzzlesParsed || 0;
        $('#datasetInfo').text(n.toLocaleString() + ' puzzles · ' + built);
      } catch (e) {
        $('#datasetInfo').text('dataset unreachable');
      }
    }

    $(init);
  })();

  // Vanilla fallback for the worst case: jQuery itself failed to load and
  // the IIFE above couldn't even register init via $(init). Surface a clear
  // error so the page doesn't just appear silently broken.
  window.addEventListener('load', function () {
    if (typeof window.jQuery !== 'function') {
      var s = document.getElementById('status');
      if (s) {
        s.textContent = 'Failed to load jQuery. Check the browser console / network tab.';
        s.setAttribute('data-kind', 'error');
      }
    }
  });
  </script>
</body>
</html>
