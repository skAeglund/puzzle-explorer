<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Puzzle Explorer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
  <style>
    :root {
      --bg: #1a1a1a;
      --surface: #242424;
      --surface-2: #2e2e2e;
      --border: #3a3a3a;
      --fg: #e8e8e8;
      --fg-dim: #a0a0a0;
      --accent: #d6a44c;
      --accent-hover: #e7b85f;
      --ok: #6fbf73;
      --warn: #d8a657;
      --error: #ea6962;
      --info: #7daea3;
      --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
    body {
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.5;
      padding: 16px;
      max-width: 520px;
      margin: 0 auto;
    }
    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 10px;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      margin: 0;
      letter-spacing: 0.02em;
    }
    h1::before { content: "♞ "; color: var(--accent); }
    #buildVersion {
      font-size: 11px;
      color: var(--fg-dim);
      letter-spacing: 0.05em;
    }
    #datasetInfo {
      font-size: 11px;
      color: var(--fg-dim);
      width: 100%;
      margin-top: 4px;
    }
    /* Review-due badge in the header. Doubles as the entry point — hidden
       at zero due, clickable when the count is positive. Sits on its own
       row (width:100%) below #datasetInfo, since #datasetInfo claims a full
       row via width:100% in the flex header. Styled as a left-aligned pill
       to read more like a status line + CTA than a generic button. */
    .review-pill {
      width: 100%;
      margin-top: 4px;
      padding: 5px 10px;
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 3px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.05em;
      text-align: left;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
    }
    .review-pill:hover {
      background: var(--accent);
      color: var(--bg);
    }
    .review-pill:focus-visible {
      outline: 2px solid var(--accent-hover);
      outline-offset: 2px;
    }

    #board {
      width: 100%;
      max-width: 400px;
      margin: 0 auto 16px;
    }
    /* Board wrapper — establishes a positioned context for the
       annotation SVG to overlay. Width matches #board's max-width so
       the SVG and the board share the same bounding box. */
    #boardWrap {
      position: relative;
      width: 100%;
      max-width: 400px;
      margin: 0 auto 16px;
    }
    #boardWrap > #board {
      /* Inside the wrapper, drop the auto-margin / max-width — the
         wrapper owns those now. Keeping width:100% so chessboard.js
         expands to fill the wrapper. */
      width: 100%;
      max-width: none;
      margin: 0;
    }
    /* Annotation overlay — pinned to the board's rect via JS each
       render. Pointer-events:none so clicks/drags pass through to the
       board's own piece interactions; right-click drawing reads its
       coordinates from the underlying #board square DOM, not the SVG. */
    #annotationLayer {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 10;
    }
    #annotationLayer.hidden { display: none; }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px;
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 11px;
      color: var(--fg-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    textarea, input[type="text"] {
      width: 100%;
      background: var(--bg);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 8px 10px;
      font-family: var(--mono);
      font-size: 12px;
      resize: vertical;
    }
    textarea:focus, input:focus {
      outline: none;
      border-color: var(--accent);
    }

    button {
      font-family: var(--mono);
      font-size: 12px;
      padding: 7px 12px;
      background: var(--surface-2);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 3px;
      cursor: pointer;
      transition: border-color 0.1s, background 0.1s;
    }
    button:hover { border-color: var(--accent); }
    button:active { background: var(--bg); }
    button.primary {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
      font-weight: 600;
    }
    button.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

    .row { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    .row > button { flex: 0 0 auto; }
    .row.examples { margin-top: 10px; }
    .row.examples > button { font-size: 11px; padding: 5px 9px; }
    /* User presets — same compact look as the examples row but with an
       inline × delete handle. The preset button + × handle are a single
       composite affordance laid out as inline-flex so they hug each other
       and wrap together when the row overflows. The × is its own <button>
       so it's keyboard-focusable and screen-reader accessible (with an
       aria-label), and the preset face is also a <button> so semantics
       match the example-btns above. */
    .row.user-presets { margin-top: 6px; }
    .preset {
      display: inline-flex;
      align-items: stretch;
      border-radius: 3px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .preset:hover { border-color: var(--accent); }
    .preset > .preset-face {
      font-family: var(--mono);
      font-size: 11px;
      padding: 5px 9px;
      background: var(--surface-2);
      color: var(--fg);
      border: none;
      border-radius: 0;
      cursor: pointer;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .preset > .preset-face:hover { background: var(--bg); }
    .preset > .preset-del {
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1;
      padding: 0 7px;
      background: var(--surface-2);
      color: var(--fg-dim);
      border: none;
      border-left: 1px solid var(--border);
      border-radius: 0;
      cursor: pointer;
    }
    .preset > .preset-del:hover { background: var(--error); color: var(--bg); }

    /* Move-builder UI: drag pieces on the board (or click-to-move) to set
       a position one ply at a time. Move list mirrors what's been played;
       Undo/Reset/Flip handle navigation; FEN textarea below stays synced. */
    #moveBuilder {
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px dashed var(--border);
    }
    #moveBuilderHelp {
      font-size: 11px;
      color: var(--fg-dim);
      margin-bottom: 6px;
    }
    #moveList {
      font-size: 12px;
      color: var(--fg);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 7px 10px;
      min-height: 1.5em;
      word-break: break-word;
      font-variant-numeric: tabular-nums;
    }
    #moveList.empty {
      color: var(--fg-dim);
      font-style: italic;
    }
    #moveList .move-num {
      color: var(--fg-dim);
      margin-right: 2px;
    }
    #moveList .move-san {
      margin-right: 8px;
    }
    .move-controls {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .move-controls > button {
      font-size: 11px;
      padding: 5px 9px;
    }
    /* Toggle-button "active" state (matches Lichess's settings-toggle look).
       Used by the color-filter button to show "My color only" is on. */
    .move-controls > button.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }
    .move-controls > button.active:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    #status {
      font-size: 12px;
      padding: 8px 10px;
      border-radius: 3px;
      margin-bottom: 12px;
      min-height: 1.5em;
      background: var(--surface);
      border-left: 3px solid var(--border);
    }
    #status[data-kind="ok"]    { border-left-color: var(--ok); }
    #status[data-kind="warn"]  { border-left-color: var(--warn); }
    #status[data-kind="error"] { border-left-color: var(--error); color: var(--error); }
    #status[data-kind="info"]  { border-left-color: var(--info); }

    #results {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    #results li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 12px;
      border: 1px solid var(--border);
      border-radius: 3px;
      margin-bottom: 4px;
      background: var(--surface);
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.1s, background 0.1s;
    }
    #results li:hover {
      border-color: var(--accent);
      background: var(--surface-2);
    }
    .result-left { display: flex; align-items: baseline; gap: 6px; }
    .puzzle-id {
      font-weight: 600;
      letter-spacing: 0.03em;
    }
    .puzzle-rating {
      color: var(--fg-dim);
      font-variant-numeric: tabular-nums;
    }
    .done-badge {
      color: var(--ok);
      font-weight: 700;
      font-size: 13px;
    }
    .results-meta {
      font-size: 11px;
      color: var(--fg-dim);
      margin: 8px 2px 6px;
    }

    /* drill panel */
    .drill-header {
      display: flex;
      gap: 10px;
      align-items: baseline;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .drill-id {
      font-weight: 600;
      letter-spacing: 0.03em;
      font-size: 13px;
    }
    .drill-rating {
      color: var(--fg-dim);
      font-variant-numeric: tabular-nums;
    }
    .drill-themes, .drill-opening {
      color: var(--fg-dim);
      font-size: 11px;
      width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .drill-controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .lichess-link {
      font-size: 12px;
      color: var(--info);
      text-decoration: none;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 3px;
      font-family: var(--mono);
    }
    .lichess-link:hover { border-color: var(--info); }
    button[disabled] { opacity: 0.45; cursor: not-allowed; }
    button[disabled]:hover { border-color: var(--border); }

    /* chessboard.js dark squares look better with a subtler border */
    #board .square-55d63 { border-radius: 0 !important; }
    /* Suppress iOS Safari's 350ms tap delay on the board. We rely on the
       synthetic mousedown that fires after a tap; without manipulation,
       that delay makes click-to-move feel laggy on iPhone. */
    #board { touch-action: manipulation; }

    /* MistakeLab-style highlight overlays. The square's own white/dark color
       comes from chessboard.js's white-1e1d7 / black-3c85d background; we
       layer overlays via ::before (z-index: -1, behind the piece) and ::after
       (default z-index, in front for legal-move dots / capture corners).
       isolation creates a per-square stacking context so z-index: -1 sits
       behind the piece but doesn't escape the square. */
    #board .square-55d63 { isolation: isolate; }

    /* Last-move highlight (persistent, Lichess green) */
    #board .square-lastmove::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(155, 199, 0, 0.41);
      pointer-events: none;
      z-index: -1;
    }
    /* Click-to-move selection (yellow). Cascade order: rules below win when
       the same square has both classes — selected wins over lastmove. */
    #board .square-selected::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255, 236, 53, 0.45);
      pointer-events: none;
      z-index: -1;
    }
    /* Hint highlight on the from-square (pulsing blue) */
    #board .square-hint::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(66, 133, 244, 0.55);
      pointer-events: none;
      z-index: -1;
      animation: hint-pulse 1.8s ease-in-out infinite;
    }
    @keyframes hint-pulse {
      0%, 100% { opacity: 0.7; }
      50%      { opacity: 1; }
    }
    /* Wrong-move flash (transient red, fades out) */
    #board .square-wrong::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(220, 50, 50, 0.55);
      pointer-events: none;
      z-index: -1;
      animation: wrong-fade 0.65s ease-out forwards;
    }
    @keyframes wrong-fade {
      from { opacity: 1; }
      to   { opacity: 0; }
    }
    /* Legal-move dot on empty target */
    #board .square-legal-dot { position: relative; cursor: pointer; }
    #board .square-legal-dot::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 28%; height: 28%;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.25);
      pointer-events: none;
    }
    /* Legal-capture indicator — corner triangles wrapping the enemy piece */
    #board .square-legal-capture { position: relative; cursor: pointer; }
    #board .square-legal-capture::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(to bottom right, rgba(0,0,0,0.25) 50%, transparent 50.5%) top left     / 22% 22% no-repeat,
        linear-gradient(to bottom left,  rgba(0,0,0,0.25) 50%, transparent 50.5%) top right    / 22% 22% no-repeat,
        linear-gradient(to top right,    rgba(0,0,0,0.25) 50%, transparent 50.5%) bottom left  / 22% 22% no-repeat,
        linear-gradient(to top left,     rgba(0,0,0,0.25) 50%, transparent 50.5%) bottom right / 22% 22% no-repeat;
    }

    /* Result badges — Lichess-style green check / red X in upper-right
       corner. square-correct paints the green check on the puzzle's last
       solution-move TO-square at completion (persists until the next
       puzzle starts or user goes back). square-wrong-x paints the red X
       on a wrong attempt's TO-square; cleared at the start of the next
       move attempt or piece selection so it doesn't co-exist with the
       legal-move dots/triangles (which also use ::after). Same SVG geom:
       circle, white border, white path; cross-square legibility comes
       from the white outline + drop-shadow. */
    #board .square-correct,
    #board .square-wrong-x { position: relative; }
    #board .square-correct::after,
    #board .square-wrong-x::after {
      content: '';
      position: absolute;
      top: 4%;
      right: 4%;
      width: 32%;
      height: 32%;
      pointer-events: none;
      filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.45));
      background-position: center;
      background-repeat: no-repeat;
      background-size: contain;
    }
    #board .square-correct::after {
      background-image: url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ccircle cx='12' cy='12' r='11' fill='%23629924' stroke='%23ffffff' stroke-width='1.5'/%3E%3Cpath d='M6 12.5 L10 16.5 L18 8.5' stroke='%23ffffff' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    }
    #board .square-wrong-x::after {
      background-image: url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ccircle cx='12' cy='12' r='11' fill='%23ac4040' stroke='%23ffffff' stroke-width='1.5'/%3E%3Cline x1='8' y1='8' x2='16' y2='16' stroke='%23ffffff' stroke-width='2.6' stroke-linecap='round'/%3E%3Cline x1='16' y1='8' x2='8' y2='16' stroke='%23ffffff' stroke-width='2.6' stroke-linecap='round'/%3E%3C/svg%3E");
    }

    /* Check / checkmate aura on the king's square (Lichess radial-gradient).
       Placed AFTER lastmove/selected/hint so cascade resolves in favour of
       check when the king sits on a recent-move or selected square. */
    #board .square-check::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center,
        rgba(255, 0, 0, 1) 0%,
        rgba(231, 0, 0, 1) 25%,
        rgba(169, 0, 0, 0) 89%,
        rgba(158, 0, 0, 0) 100%);
      pointer-events: none;
      z-index: -1;
    }
    #board .square-checkmate::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center,
        rgba(255, 0, 0, 1) 0%,
        rgba(231, 0, 0, 1) 25%,
        rgba(169, 0, 0, 0) 89%,
        rgba(158, 0, 0, 0) 100%);
      pointer-events: none;
      z-index: -1;
      animation: checkmate-pulse 1.4s ease-in-out infinite;
    }
    @keyframes checkmate-pulse {
      0%, 100% { opacity: 0.9; }
      50%      { opacity: 1; }
    }

    /* ─── session mode: dual-range rating slider + counts + progress ─────
       Two stacked range inputs on a single track, with `pointer-events`
       routed only to the thumbs so both handles remain grabbable. The
       inputs themselves overlay each other — z-index would lock one thumb
       behind the other if both reached the same value. We use a strict
       snap-to-bound clamp in JS (min ≤ max enforced via 'input' handlers);
       at the rare collide point the trailing-DOM thumb wins clicks, so
       users disambiguate by pulling the OUTER bound first. ────────────── */
    .dual-range {
      position: relative;
      height: 28px;
      margin: 6px 6px 4px;
    }
    .dual-range .range-track {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--surface-2);
      border-radius: 2px;
      transform: translateY(-50%);
    }
    .dual-range .range-fill {
      position: absolute;
      top: 50%;
      height: 4px;
      background: var(--accent);
      border-radius: 2px;
      transform: translateY(-50%);
      pointer-events: none;
    }
    .dual-range input[type=range] {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 28px;
      background: transparent;
      pointer-events: none;
      -webkit-appearance: none;
      appearance: none;
      margin: 0;
      outline: none;
    }
    /* Thumb cross-browser: WebKit + Firefox prefixes are non-overlapping,
       so duplicate the rule rather than collapse with a comma (browsers
       discard rules they don't recognize, and the comma form would taint
       both). */
    .dual-range input[type=range]::-webkit-slider-thumb {
      pointer-events: auto;
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
      cursor: grab;
    }
    .dual-range input[type=range]::-moz-range-thumb {
      pointer-events: auto;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
      cursor: grab;
    }
    .dual-range input[type=range]:active::-webkit-slider-thumb { cursor: grabbing; }
    .dual-range input[type=range]:active::-moz-range-thumb     { cursor: grabbing; }
    .dual-range input[type=range]::-webkit-slider-runnable-track { background: transparent; border: 0; }
    .dual-range input[type=range]::-moz-range-track { background: transparent; border: 0; }
    .range-values {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--fg-dim);
      font-variant-numeric: tabular-nums;
      margin: 0 4px 8px;
    }
    .session-counts {
      font-size: 12px;
      color: var(--fg);
      margin: 4px 2px 8px;
      font-variant-numeric: tabular-nums;
    }
    .session-counts.empty { color: var(--fg-dim); }
    .session-progress {
      font-size: 11px;
      color: var(--fg-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      font-variant-numeric: tabular-nums;
    }
    .session-progress.complete { color: var(--ok); }

    /* Completion strip — appears at the bottom of the drill panel when the
       puzzle is solved. Holds the result text on the left (color-coded by
       grade) and a prominent "Next puzzle" CTA on the right (session
       mode only — single-puzzle mode shows just the text). Border-top
       separates it from the controls row above. */
    .completion-strip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .completion-text {
      font-size: 13px;
      font-weight: 600;
      flex: 1 1 auto;
      font-variant-numeric: tabular-nums;
      min-width: 0;        /* allow wrap inside flex */
    }
    .completion-text.ok    { color: var(--ok); }
    .completion-text.warn  { color: var(--warn); }
    .completion-text.error { color: var(--error); }

    /* Big CTA — taller padding, slightly bigger font. Used for the
       Next-puzzle button inside the completion strip. */
    button.big-cta {
      font-size: 14px;
      padding: 10px 18px;
      letter-spacing: 0.02em;
    }

    /* Disable chessboard.js's built-in drag-source / drag-hover highlights
       (we use our own .square-selected + legal-move dots/triangles).
       chessboard.js applies these via salt-suffixed classes (highlight1-32417,
       highlight2-9c5d2) and their CSS rule is `box-shadow: inset 0 0 3px 3px
       yellow` — that's the ONLY visual effect to suppress. Earlier this rule
       also set `background-color: transparent !important`, which inadvertently
       overrode .white-1e1d7 / .black-3c85d (chessboard.js's actual square
       colors), making the square transparent and revealing --bg behind it
       — manifesting as a dark-olive blend on selected squares during drag
       and a near-black overlay on drag-hover targets. Box-shadow only. */
    .highlight1-32417,
    .highlight2-9c5d2,
    [class*="highlight1-"],
    [class*="highlight2-"],
    #board [class*="highlight1-"],
    #board [class*="highlight2-"] {
      box-shadow: none !important;
    }
    /* Kill the mobile tap-flash on the board too. */
    #board, #board * {
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>
  <header>
    <h1>Puzzle Explorer</h1>
    <span id="buildVersion">analyze-on-lichess</span>
    <span id="datasetInfo">loading dataset…</span>
    <button id="reviewBadge" class="review-pill" type="button" hidden></button>
  </header>

  <main>
    <!-- The board + annotation SVG share a positioned container so the
         SVG can be pinned to the board's exact rect. The SVG is a sibling
         of #board (not a child) — chessboard.js empties #board on every
         destroy/rebuild, but the SVG persists across mode swaps. -->
    <div id="boardWrap">
      <div id="board"></div>
      <svg id="annotationLayer" class="hidden"></svg>
    </div>

    <div id="searchPanel" class="panel">
      <div id="moveBuilder">
        <div id="moveBuilderHelp">Drag pieces on the board (or click-to-move) to set a position from the start.</div>
        <div id="moveList" class="empty">starting position</div>
        <div class="move-controls">
          <button id="undoBtn" title="Undo last move">Undo</button>
          <button id="resetBtn" title="Reset to start position">Reset</button>
          <button id="flipBtn" title="Flip board orientation">Flip</button>
          <button id="colorFilterBtn" title="Filter puzzles by board orientation (the color you're playing)">My color only</button>
        </div>
      </div>
      <label for="fenInput">Position FEN</label>
      <textarea id="fenInput" rows="2"
        placeholder="Paste a FEN here…"></textarea>
      <div class="row">
        <button id="applyBtn">Apply FEN</button>
        <button id="searchBtn" class="primary">Search puzzles</button>
        <button id="savePresetBtn" title="Save the current position as a preset">Save position</button>
      </div>
      <div class="row examples">
        <button class="example-btn" data-fen="rnbqkbnr/pppppppp/8/8/4P3/8/PPPP1PPP/RNBQKBNR b KQkq - 0 1">After 1. e4</button>
        <button class="example-btn" data-fen="rnbqkbnr/pppp1ppp/8/4p3/4P3/8/PPPP1PPP/RNBQKBNR w KQkq - 0 2">1. e4 e5</button>
        <button class="example-btn" data-fen="r1b5/pp1nkpr1/2q1p3/8/3N4/3B4/P1P2PPP/R2Q1RK1 b - - 4 18">specific puzzle</button>
      </div>
      <!-- User-saved presets. Hidden when empty; populated by renderUserPresets(). -->
      <div class="row user-presets" id="userPresetsRow" hidden></div>
    </div>

    <div id="drillPanel" class="panel" hidden>
      <div class="session-progress" id="sessionProgress" hidden></div>
      <div class="drill-header">
        <span class="drill-id" id="drillId">—</span>
        <span class="drill-rating" id="drillRating">—</span>
      </div>
      <div class="drill-themes" id="drillThemes"></div>
      <div class="drill-opening" id="drillOpening"></div>
      <div class="drill-controls">
        <button id="hintBtn">Hint</button>
        <button id="backBtn" class="primary">Back to results</button>
        <a id="lichessLink" class="lichess-link" href="#" target="_blank" rel="noopener">view source game ↗</a>
        <a id="analyzeLink" class="lichess-link" href="#" target="_blank" rel="noopener" title="Open this position on Lichess's analysis board with engine evaluation">analyze on Lichess ↗</a>
      </div>
      <!-- Completion strip — populated and shown by handleCompletion. The
           Next-puzzle button inside is itself toggled by session mode. -->
      <div id="completionStrip" class="completion-strip" hidden>
        <span id="completionText" class="completion-text"></span>
        <button id="nextPuzzleBtn" class="primary big-cta" disabled hidden>Next puzzle →</button>
      </div>
    </div>

    <div id="status" data-kind="info">Set a position and click Search.</div>

    <div id="sessionPanel" class="panel" hidden>
      <label>Rating range</label>
      <div class="dual-range" id="ratingRange">
        <div class="range-track"></div>
        <div class="range-fill" id="rangeFill"></div>
        <!-- DOM order: min first, max second. The trailing-DOM thumb wins
             clicks at collide points; users disambiguate by grabbing max
             first. See CSS comment above. -->
        <input type="range" id="ratingMin" min="0" max="3000" value="0" step="50">
        <input type="range" id="ratingMax" min="0" max="3000" value="3000" step="50">
      </div>
      <div class="range-values">
        <span id="rangeMinLabel">0</span>
        <span id="rangeMaxLabel">3000</span>
      </div>
      <div class="session-counts" id="sessionCounts">—</div>
      <div class="row">
        <button id="startSessionBtn" class="primary">Start session</button>
      </div>
    </div>

    <div class="results-meta" id="resultsMeta" hidden></div>
    <ol id="results"></ol>
  </main>

  <!-- Libraries: jQuery 3.7.1, chess.js 0.10.3, chessboard.js 1.0.0 (per project pin) -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chess.js@0.10.3/chess.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
  <!-- Shared posKey lib (must produce byte-identical keys with the build) -->
  <script src="lib/posKey.js"></script>
  <!-- FSRS scheduler (must precede drill.js + progress.js — they reference root.FSRS) -->
  <script src="lib/fsrs.js"></script>
  <script src="lib/drill.js"></script>
  <script src="lib/session.js"></script>
  <script src="lib/progress.js"></script>

  <script>
  'use strict';
  (function () {
    var board = null;
    var chess = null;
    var MAX_RESULTS = 100;       // cap visible matches; filters/pagination later
    // Shards live in a sibling repo (puzzle-explorer-data) served via its own
    // Pages site. Cross-origin fetch is fine — Pages sets ACAO:* by default.
    var DATA_BASE_URL = 'https://skaeglund.github.io/puzzle-explorer-data/';

    // Mode + drill state. mode flips between 'search' and 'drill'; the
    // search panel/result list and the drill panel are mutually-exclusive
    // views over the shared #board. Re-initializing chessboard.js between
    // modes keeps onDrop handler closures + draggable flag clean.
    var mode = 'search';
    var drillState = null;       // current Drill state machine result
    var drillPuzzle = null;      // the body object {id, fen, moves, rating, themes, ...}
    var lastMatches = null;      // cached for re-render on back-from-drill
    var searchFen = null;        // remembered so we can restore the board on back
    // Search-mode move builder. searchMoveHistory is the list of plies
    // played from the start position via drag/click — each entry is
    // {san, from, to}. searchOrientation persists across drill-mode round
    // trips so flipping the board sticks. searchFen + searchMoveHistory
    // together describe the current search-mode state; either one can be
    // restored from the other (history → replay; fen → drop history,
    // start fresh).
    var searchMoveHistory = [];
    var searchOrientation = 'white';
    // Color-of-perspective filter. When true (default), search results are
    // filtered to puzzles whose side-to-move matches searchOrientation —
    // i.e. you only see puzzles where the color you're playing is the one
    // about to move. Toggled via the "All colors" / "My color only" button
    // in the move-controls row. Filtering happens in searchPuzzles before
    // rendering and caching, so session-mode + back-from-drill see the
    // already-filtered set.
    var matchOwnColorOnly = true;
    var pendingOppReply = null;  // UCI of opp's auto-reply, scheduled in onSnapEnd
    var oppReplyTimeout = null;  // setTimeout id; cleared on back/destroy
    var introTimeout = null;     // setTimeout id for the pre-puzzle blunder animation
    // Click-to-move state. selectedSquare tracks the user's currently-selected
    // own piece. deselectionPending implements MistakeLab's mousedown/mouseup
    // dance: clicking the already-selected square doesn't deselect immediately
    // (so a drag can still start), but the mouseup that follows without a
    // drag-and-drop completes the deselection.
    var selectedSquare = null;
    var deselectionPending = false;
    // After a successful user move via drag, onSnapEnd needs to know which
    // squares to paint .square-lastmove on (chessboard.js's animated position()
    // re-creates the square DOM nodes on completion, wiping any classes set
    // before the animation resolved). Cleared after consumption.
    var lastSuccessfulUserMove = null;
    // Edge case: drill.attemptUserMove permits a 'complete' result that
    // carries an opponentReply (even-length solutionUci — opp gets the
    // last move). Lichess convention is odd-length so this is rare/never
    // in real data, but match the state machine's contract: queue the opp
    // move, defer completion UI until after the animation.
    var pendingCompletionResult = null;

    // ── Right-click annotation state (issue #3) ──
    // Right-click drag A→B paints a persistent arrow; right-click on a
    // single square (mousedown + mouseup, no drag) toggles a circle.
    // Modifier keys pick the color (Lichess convention):
    //   default = green, Shift = red, Alt = blue, Shift+Alt = yellow.
    // State lives in two Maps keyed by uci-like strings so toggling is
    // O(1) and serialization is trivial. ghost* are transient previews
    // shown during the right-click hold/drag, before mouseup commits.
    // arrowStartSquare is non-null iff a right-click is in progress.
    var activeArrows = new Map();         // "e2e4" → 'green'|'red'|'blue'|'yellow'
    var activeCircles = new Map();        // "e4"   → color
    var ghostArrow = null;                // {from,to} during drag
    var ghostCircle = null;               // square string before drag
    var ghostCircleWasColor = null;       // color of pre-existing circle, if any
    var arrowStartSquare = null;          // square where current right-click started
    var currentDrawColor = 'green';       // recomputed from modifiers on each mousedown
    var isRightClicking = false;          // tracks an in-progress right-click gesture

    // Session state — null when not in a session. Built by Session.create
    // from the current `lastMatches` + slider range when the user clicks
    // "Start session". Walked by Session.advance on each "Next puzzle"
    // click. Cleared on "Back to results". A row click in search-mode
    // bypasses session entirely (sessionState stays null).
    var sessionState = null;
    // Race guard for the session click handlers. Session.advance runs
    // synchronously inside advanceSessionAndDrill BEFORE its await on
    // startDrillByPuzzleId, so a fast double-click would advance the
    // cursor twice (skipping a puzzle) — the disabled-attribute set
    // inside the handler isn't reliable since the second click event
    // can already be queued before disabled flips. JS guard checked
    // synchronously at function entry plugs this hole.
    var sessionLoading = false;

    function init() {
      var missing = [];
      if (typeof Chess !== 'function') missing.push('chess.js');
      if (typeof Chessboard !== 'function') missing.push('chessboard.js');
      if (typeof fenPositionKey !== 'function') missing.push('lib/posKey.js');
      if (typeof FSRS !== 'object' || !FSRS) missing.push('lib/fsrs.js');
      if (typeof Drill !== 'object' || !Drill) missing.push('lib/drill.js');
      if (typeof Session !== 'object' || !Session) missing.push('lib/session.js');
      if (typeof Progress !== 'object' || !Progress) missing.push('lib/progress.js');
      if (missing.length) {
        setStatus('Failed to load: ' + missing.join(', ') + '. Check the browser console / network tab.', 'error');
        return;
      }
      // Build the initial interactive search board. rebuildSearchBoard
      // sets `chess` to a fresh Chess() (start position) and installs the
      // drag/drop handlers used by the move builder.
      rebuildSearchBoard();
      $(window).on('resize', function () {
        if (board) board.resize();
        renderAnnotations();   // SVG follows the board's bounding box
      });

      $('#applyBtn').on('click', applyFen);
      $('#searchBtn').on('click', searchPuzzles);
      $('#fenInput').on('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); applyFen(); }
      });
      $(document).on('click', '.example-btn', function () {
        $('#fenInput').val($(this).data('fen'));
        applyFen();
      });

      // User-preset buttons. Click the face → load the preset's FEN
      // (same behavior as example-btn). Click the × → delete with
      // confirm. Both are delegated since the row is re-rendered on
      // every save / delete.
      $('#savePresetBtn').on('click', onSavePresetClick);
      $('#userPresetsRow').on('click', '.preset-face', function () {
        var fen = $(this).data('fen');
        if (!fen) return;
        $('#fenInput').val(fen);
        applyFen();
      });
      $('#userPresetsRow').on('click', '.preset-del', function (e) {
        // The face and the × are siblings inside the same .preset wrapper;
        // clicks on the × bubble up through .preset, which itself has no
        // handler, so no propagation guard is needed here. The handler is
        // bound on .preset-del directly.
        e.stopPropagation();
        var name = $(this).attr('data-preset-name');
        if (typeof name === 'string') deleteUserPreset(name);
      });

      // Move-builder buttons.
      $('#undoBtn').on('click', undoSearchMove);
      $('#resetBtn').on('click', resetSearchPosition);
      $('#flipBtn').on('click', flipSearchBoard);
      $('#colorFilterBtn').on('click', toggleColorFilter);
      updateColorFilterBtn();

      // Drill UI handlers. Result-row click is delegated since rows are
      // re-rendered on each search.
      $('#hintBtn').on('click', onHintClick);
      $('#backBtn').on('click', onBackClick);
      $('#nextPuzzleBtn').on('click', onNextPuzzleClick);
      $('#startSessionBtn').on('click', onStartSessionClick);
      $('#reviewBadge').on('click', onReviewBadgeClick);
      // Slider 'input' fires continuously as the user drags; 'change'
      // fires only on release. Use 'input' for live count + fill updates.
      $('#ratingMin, #ratingMax').on('input', onRatingSliderInput);
      $('#results').on('click', 'li[data-puzzle-id]', function () {
        var pid = $(this).attr('data-puzzle-id');
        if (pid) startDrillByPuzzleId(pid);
      });

      // Click-to-move: capture-phase mousedown so we can intercept the click
      // BEFORE chessboard.js's drag-start logic kicks in (and call
      // stopPropagation on destination clicks so the click doesn't try to
      // start a drag on the enemy piece). MistakeLab uses the same pattern.
      // The handlers run in BOTH search and drill modes — the click-to-move
      // selection logic is mode-agnostic, the move-execution call dispatches
      // on `mode` via attemptMove.
      var boardEl = document.getElementById('board');
      if (boardEl) {
        boardEl.addEventListener('mousedown', onBoardMouseDown, true);
        boardEl.addEventListener('mouseup',   onBoardMouseUp,   true);
        // Suppress the browser context menu on right-click in either mode.
        // Right-click is repurposed for arrow/circle annotations
        // (issue #3 — handled in onBoardMouseDown).
        boardEl.addEventListener('contextmenu', function (e) {
          e.preventDefault();
        });
        // Note: NOT binding touchstart/touchend. On mobile, taps fire a
        // synthetic mousedown after touchend; binding both would double-
        // handle every tap (clear selection right after setting it). The
        // CSS `touch-action: manipulation` on #board removes iOS's 350ms
        // tap delay so the synthetic mousedown still feels instant.
      }
      // Window-level mousemove + mouseup for the right-click annotation
      // gesture. mousemove updates the ghost arrow as the user drags;
      // mouseup commits, even if the release is off-board (window-level
      // catches it where boardEl wouldn't). The boardEl mouseup binding
      // above remains and handles the on-board case — and onBoardMouseUp
      // is idempotent on `isRightClicking` so a window+board double-fire
      // resolves cleanly (the second call sees isRightClicking=false).
      window.addEventListener('mousemove', onWindowMouseMove);
      window.addEventListener('mouseup', onBoardMouseUp);
      // Escape clears any active selection AND any drawn annotations
      // (Lichess convention) — works in both search and drill modes.
      $(document).on('keydown', function (e) {
        if (e.key === 'Escape') {
          if (selectedSquare) {
            clearSelection();
            deselectionPending = false;
          }
          if (hasAnyAnnotations()) clearAnnotations();
        }
      });

      loadDatasetInfo();
      refreshReviewBadge();
      renderUserPresets();
    }

    function applyFen() {
      var fen = $('#fenInput').val().trim();
      if (!fen) { setStatus('Paste a FEN first.', 'warn'); return; }
      var c = new Chess();
      if (!c.load(fen)) {
        setStatus('Invalid FEN — chess.js could not parse it.', 'error');
        return;
      }
      chess = c;
      // Pasted FEN means the move history (which is rooted at the start
      // position) no longer applies. Clear it and reflect the canonicalized
      // FEN back into the textarea.
      searchMoveHistory = [];
      searchFen = c.fen();
      board.position(c.fen(), false);
      // Pasted FEN may have its own side-to-move; clear any stale highlights.
      clearLastMove();
      clearCheck();
      showCheckDeferred(c);
      updateMoveListDisplay();
      updateFenInputFromBoard();
      setStatus('Position loaded. Click Search.', 'ok');
      $('#results').empty();
      $('#resultsMeta').hide();
      // Hide the session panel — its slider/counts are tied to the
      // previous search's matches and would be misleading until the
      // user re-searches against the new FEN.
      $('#sessionPanel').hide();
      lastMatches = null;
    }

    async function searchPuzzles() {
      if (typeof fenPositionKey !== 'function') {
        setStatus('lib/posKey.js failed to load — check the network tab.', 'error');
        return;
      }
      var fen = chess.fen();
      searchFen = fen;
      var key = fenPositionKey(fen);
      var shard;
      try {
        shard = await shardIdAsync(key);
      } catch (e) {
        setStatus('SHA-1 hashing not available (Web Crypto required, http context).', 'error');
        return;
      }
      setStatus('Fetching shard ' + shard + '…', 'info');
      var url = DATA_BASE_URL + 'index/' + shard + '.json';
      try {
        var res = await fetch(url);
        if (!res.ok) {
          if (res.status === 404) {
            renderResults([]);
            setStatus('No puzzles found at this position. (Shard ' + shard + ' not present — that bucket has no entries in the current dataset.)', 'info');
            return;
          }
          throw new Error('HTTP ' + res.status);
        }
        var idx = await res.json();
        var rawMatches = idx[key] || [];
        // Filter by color-of-perspective (off → no-op slice; on → keeps
        // entries matching the orientation, plus legacy entries with no
        // m[2] field). Done BEFORE renderResults so lastMatches caches
        // the filtered set — back-from-drill and session-mode all see
        // the same view consistently.
        var matches = filterByPerspective(rawMatches);
        renderResults(matches);
        // Reset slider bounds to the data extents on every fresh search.
        // (onBackClick re-renders without resetting bounds, so the user's
        // chosen range survives a single-puzzle drill round-trip.)
        configureSlider(matches);
        var filteredOut = rawMatches.length - matches.length;
        var filterNote = (matchOwnColorOnly && filteredOut > 0)
          ? ' (' + filteredOut + ' hidden — wrong color)'
          : '';
        if (matches.length === 0) {
          if (rawMatches.length > 0 && matchOwnColorOnly) {
            // All matches were the wrong color. Tell the user how to see them.
            setStatus(rawMatches.length + ' match' +
              (rawMatches.length === 1 ? '' : 'es') +
              ' found, but none match your color. Click "All colors" or Flip the board.', 'info');
          } else {
            setStatus('No puzzles found at this position. (Shard ' + shard + ' fetched, but the position key isn\'t indexed.)', 'info');
          }
        } else if (matches.length > MAX_RESULTS) {
          setStatus(matches.length + ' matches found' + filterNote +
            ' (showing first ' + MAX_RESULTS + ' by rating).', 'ok');
        } else {
          setStatus(matches.length + ' match' + (matches.length === 1 ? '' : 'es') +
            ' found' + filterNote + '.', 'ok');
        }
      } catch (e) {
        setStatus('Fetch error: ' + e.message + '. Are you serving over http (not file://)? Is data/ generated?', 'error');
      }
    }

    async function shardIdAsync(s) {
      var buf = new TextEncoder().encode(s);
      var h = await crypto.subtle.digest('SHA-1', buf);
      var bytes = new Uint8Array(h);
      var hex = '';
      for (var i = 0; i < bytes.length; i++) {
        hex += bytes[i].toString(16).padStart(2, '0');
      }
      return hex.slice(0, SHARD_HEX_LEN);
    }

    function renderResults(matches) {
      lastMatches = matches;
      var $list = $('#results').empty();
      var $meta = $('#resultsMeta');
      if (!matches.length) {
        $meta.hide();
        $('#sessionPanel').hide();
        return;
      }
      // sort by rating asc; stable enough for our purposes
      matches.sort(function (a, b) { return a[1] - b[1]; });
      var shown = matches.slice(0, MAX_RESULTS);
      $meta.text('id · rating  (sorted by rating, lowest first — click a row to drill)').show();
      for (var i = 0; i < shown.length; i++) {
        var m = shown[i];
        var pid = m[0];
        var rating = m[1];
        var $li = $('<li></li>')
          .attr('data-puzzle-id', pid)
          .attr('data-rating', rating || '');
        var $left = $('<span class="result-left"></span>');
        if (Progress.isCompleted(pid)) {
          $left.append($('<span class="done-badge" title="Previously completed">✓</span>'));
        }
        $left.append($('<span class="puzzle-id"></span>').text(pid));
        $li.append($left);
        $li.append($('<span class="puzzle-rating"></span>').text(rating || '—'));
        $list.append($li);
      }
      $('#sessionPanel').show();
    }

    // ─── session: rating slider config + live counts ────────────────────
    // configureSlider runs on a fresh search — it resets the input bounds
    // (min/max attrs) and pins the values to the data extents. Snaps to
    // 50-rating buckets to make the labels read cleanly. Edge: if all
    // matches share a single rating, expand the bound by one step so the
    // input has a non-zero range (otherwise both thumbs collapse and the
    // browser may reject the value attribute).
    function configureSlider(matches) {
      var ratings = [];
      for (var i = 0; i < matches.length; i++) {
        var r = matches[i][1];
        if (typeof r === 'number' && isFinite(r)) ratings.push(r);
      }
      var $rmin = $('#ratingMin'), $rmax = $('#ratingMax');
      if (!ratings.length) {
        // No usable ratings — hide the slider area inside the panel by
        // simply leaving defaults. Counts will say "no puzzles in range".
        $rmin.attr({ min: 0, max: 3000 }).val(0);
        $rmax.attr({ min: 0, max: 3000 }).val(3000);
        updateSessionPanelUI();
        return;
      }
      var lo = Math.min.apply(null, ratings);
      var hi = Math.max.apply(null, ratings);
      var sliderMin = Math.floor(lo / 50) * 50;
      var sliderMax = Math.ceil(hi / 50) * 50;
      if (sliderMax <= sliderMin) sliderMax = sliderMin + 50;
      // Set max attr first when raising; set min attr first when lowering.
      // Browsers clamp value to attr-bounds at attribute-set time, so
      // changing min above the current value would truncate. Setting both
      // attrs THEN the values avoids that.
      $rmin.attr({ min: sliderMin, max: sliderMax });
      $rmax.attr({ min: sliderMin, max: sliderMax });
      $rmin.val(sliderMin);
      $rmax.val(sliderMax);
      updateSessionPanelUI();
    }

    // updateSessionPanelUI re-reads slider values, recomputes the fill
    // overlay + labels, and updates the in-range/unsolved counts. Cheap;
    // safe to call on every 'input' event.
    function updateSessionPanelUI() {
      var $rmin = $('#ratingMin'), $rmax = $('#ratingMax');
      var rmin = +$rmin.val();
      var rmax = +$rmax.val();
      var attrMin = +$rmin.attr('min');
      var attrMax = +$rmin.attr('max');
      var span = attrMax - attrMin;
      var loPct = span > 0 ? ((rmin - attrMin) / span) * 100 : 0;
      var hiPct = span > 0 ? ((rmax - attrMin) / span) * 100 : 100;
      $('#rangeFill').css({ left: loPct + '%', width: (hiPct - loPct) + '%' });
      $('#rangeMinLabel').text(rmin);
      $('#rangeMaxLabel').text(rmax);

      // Live counts.
      var $counts = $('#sessionCounts');
      var $btn = $('#startSessionBtn');
      if (!lastMatches || !lastMatches.length) {
        $counts.text('—').addClass('empty');
        $btn.prop('disabled', true);
        return;
      }
      var inRange = Session.filterByRating(lastMatches, rmin, rmax);
      var unsolved = Session.countUnsolved(inRange, Progress.isCompleted);
      var solved = inRange.length - unsolved;
      var msg;
      if (inRange.length === 0) {
        msg = 'No puzzles in this range.';
        $counts.addClass('empty');
      } else if (unsolved === 0) {
        msg = 'All ' + solved + ' puzzles in range already solved.';
        $counts.addClass('empty');
      } else {
        msg = unsolved + ' unsolved';
        if (solved > 0) msg += ' · ' + solved + ' already solved';
        $counts.removeClass('empty');
      }
      $counts.text(msg);
      $btn.prop('disabled', unsolved === 0);
    }

    // Slider 'input' handler — clamps min ≤ max via snap-to-bound. When
    // both thumbs collide the user disambiguates by grabbing whichever
    // thumb is at the OUTER end (browsers prefer the trailing-DOM input
    // for clicks on stacked elements; max is later in the DOM, so max
    // wins collide-clicks). Acceptable trade-off for an MVP slider —
    // alternative is dynamic z-index swapping which is fiddly.
    function onRatingSliderInput(e) {
      var rmin = +$('#ratingMin').val();
      var rmax = +$('#ratingMax').val();
      var which = e.target && e.target.id;
      if (which === 'ratingMin' && rmin > rmax) {
        $('#ratingMin').val(rmax);
      } else if (which === 'ratingMax' && rmax < rmin) {
        $('#ratingMax').val(rmin);
      }
      updateSessionPanelUI();
    }

    // ─── drill mode ─────────────────────────────────────────────────────
    // Click on a result row → fetch puzzle body shard → find by id → drill.
    // Body shards are keyed by SHA-1 prefix of puzzleId (per build-index.js
    // shardId(body.id)). Same hashing as positions, just over a different
    // input. ndjson: one body per line, no ordering guarantee.
    // Returns true on successful enterDrillMode, false on any failure.
    // The session flow uses this to detect body-fetch failures and bail
    // out cleanly. Row-click callers can ignore the return value.
    async function startDrillByPuzzleId(puzzleId) {
      setStatus('Loading puzzle ' + puzzleId + '…', 'info');
      var bodyShard;
      try {
        bodyShard = await shardIdAsync(puzzleId);
      } catch (e) {
        setStatus('SHA-1 hashing not available (Web Crypto required, http context).', 'error');
        return false;
      }
      var url = DATA_BASE_URL + 'puzzles/' + bodyShard + '.ndjson';
      try {
        var res = await fetch(url);
        if (!res.ok) {
          setStatus('Body shard ' + bodyShard + ' fetch failed (HTTP ' + res.status + ').', 'error');
          return false;
        }
        var text = await res.text();
        var puzzle = null;
        var lines = text.split('\n');
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i];
          if (!line) continue;
          // Defensive parse — a corrupt line shouldn't kill the whole search.
          var obj;
          try { obj = JSON.parse(line); } catch (e) { continue; }
          if (obj && obj.id === puzzleId) { puzzle = obj; break; }
        }
        if (!puzzle) {
          setStatus('Puzzle ' + puzzleId + ' not found in body shard ' + bodyShard + '.', 'error');
          return false;
        }
        if (!puzzle.fen || !Array.isArray(puzzle.moves) || puzzle.moves.length === 0) {
          setStatus('Puzzle ' + puzzleId + ' body is malformed (missing fen/moves).', 'error');
          return false;
        }
        enterDrillMode(puzzle);
        return true;
      } catch (e) {
        setStatus('Body fetch error: ' + e.message, 'error');
        return false;
      }
    }

    function enterDrillMode(puzzle) {
      mode = 'drill';
      drillPuzzle = puzzle;
      try {
        drillState = Drill.start({
          puzzleId: puzzle.id,
          fen: puzzle.fen,
          solutionUci: puzzle.moves
        });
      } catch (e) {
        setStatus('Drill init failed: ' + e.message, 'error');
        return;
      }
      pendingOppReply = null;
      pendingCompletionResult = null;
      lastSuccessfulUserMove = null;
      if (oppReplyTimeout) { clearTimeout(oppReplyTimeout); oppReplyTimeout = null; }
      if (introTimeout) { clearTimeout(introTimeout); introTimeout = null; }
      // destroyBoard() below empties #board, taking the highlight DOM
      // classes with it — but keep state vars in sync explicitly.
      clearSelection();
      deselectionPending = false;
      // Cancel any in-flight right-click + wipe drawn annotations
      // (issue #3). Mode swap re-orients the board, so coordinates
      // saved against the old orientation would render wrong anyway.
      isRightClicking = false;
      arrowStartSquare = null;
      ghostArrow = null;
      ghostCircle = null;
      ghostCircleWasColor = null;
      clearAnnotations();

      // Swap panels.
      $('#searchPanel').hide();
      $('#sessionPanel').hide();
      $('#resultsMeta').hide();
      $('#results').hide();
      $('#drillPanel').show();
      $('#drillId').text(puzzle.id);
      $('#drillRating').text(puzzle.rating ? ('rating ' + puzzle.rating) : '');
      var themesText = (puzzle.themes && puzzle.themes.length) ? puzzle.themes.join(' · ') : '';
      $('#drillThemes').text(themesText).toggle(!!themesText);
      $('#drillOpening').text(puzzle.opening || '').toggle(!!puzzle.opening);
      if (puzzle.gameUrl) {
        $('#lichessLink').attr('href', puzzle.gameUrl).show();
      } else {
        $('#lichessLink').hide();
      }
      // "Analyze on Lichess" — opens Lichess's analysis board pre-loaded
      // with the puzzle's starting FEN (issue #4). Lichess's URL flow
      // (/analysis/<FEN>) only carries the position, NOT the solution
      // moves: their inline-PGN URL (/analysis/pgn/...) doesn't accept
      // [FEN ...] headers reliably (lila #16286), and there's no
      // ?pgn= query param (lila #10205, still open). Engine evaluation
      // works on whatever position loads — the moves the user just
      // played are fresh in their head, and they'll typically want to
      // explore alternatives anyway. So FEN-only is the right MVP and
      // honest about what Lichess supports.
      $('#analyzeLink').attr('href', buildLichessAnalysisUrl(puzzle));
      $('#hintBtn').prop('disabled', false).text('Hint');

      // Session-mode UI: progress label up top, Back demoted to "Exit
      // session". Single-puzzle drill (no sessionState): Back stays
      // primary, no progress label. The Next-puzzle button now lives
      // inside #completionStrip (toggled by handleCompletion); during
      // drilling the strip is hidden.
      if (sessionState) {
        var prog = Session.progress(sessionState);
        var label = (sessionState.kind === 'review') ? 'Review ' : 'Puzzle ';
        $('#sessionProgress')
          .removeClass('complete')
          .text(label + prog.current + ' of ' + prog.total)
          .show();
        var exitLabel = (sessionState.kind === 'review') ? 'Exit review' : 'Exit session';
        $('#backBtn').removeClass('primary').text(exitLabel);
      } else {
        $('#sessionProgress').hide();
        $('#backBtn').addClass('primary').text('Back to results');
      }
      // Reset completion-strip + result badges for the new puzzle.
      // destroyBoard() already wipes the board DOM (so square-correct /
      // square-wrong-x classes vanish with it), but be explicit.
      $('#completionStrip').hide();
      $('#completionText').removeClass('ok warn error').text('');
      $('#nextPuzzleBtn').prop('disabled', true).hide();
      clearCompletionBadge();
      clearWrongX();

      // If the analyzer emitted previousFen + previousMove, show the
      // pre-blunder position briefly, then animate the move that creates
      // the tactic. Backward-compatible: older bodies without these fields
      // start the user directly at puzzle.fen.
      var hasIntro = !!(puzzle.previousFen && puzzle.previousMove);
      var initialFen = hasIntro ? puzzle.previousFen : puzzle.fen;

      // Reset chess.js to the initial position. v0.10.3 load() returns boolean.
      chess = new Chess();
      if (!chess.load(initialFen)) {
        setStatus('chess.js could not load FEN: ' + initialFen, 'error');
        return;
      }

      // Rebuild the board with drill handlers + correct orientation. The
      // board element is the same #board div used by search mode.
      // Orientation is the user's color (from puzzle.fen, post-blunder),
      // not the side-to-move at initialFen — even during the intro the
      // board should already be flipped for the player.
      var orientation = Drill.userColor(drillState) === 'b' ? 'black' : 'white';
      destroyBoard();
      board = Chessboard('board', {
        position: initialFen,
        pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
        showNotation: true,
        draggable: true,
        orientation: orientation,
        onDragStart: onDragStart,
        onDrop: onDrop,
        onSnapEnd: onSnapEnd
      });

      if (hasIntro) {
        // During the wait, onDragStart already blocks user from moving
        // because chess.turn() is the opponent's color at previousFen.
        // No lastmove highlight yet — the blunder hasn't been "played".
        setStatus('Opponent to move…', 'info');
        introTimeout = setTimeout(function () {
          introTimeout = null;
          if (mode !== 'drill' || !drillState) return; // user backed out
          var uci = puzzle.previousMove;
          var m;
          try {
            m = chess.move({
              from: uci.slice(0, 2),
              to: uci.slice(2, 4),
              promotion: uci[4] || undefined
            });
          } catch (e) { m = null; }
          if (!m) {
            // Data integrity issue — fall back to dropping the user
            // straight at puzzle.fen so they can still drill.
            chess = new Chess();
            chess.load(puzzle.fen);
            if (board) board.position(puzzle.fen, false);
            showCheck(chess);
            setStatus('(could not animate setup move ' + uci + ') Your move.', 'warn');
            return;
          }
          if (board) board.position(chess.fen()); // animated by default
          // Show the blunder squares as the lastmove + paint check on
          // the player's king if applicable. Deferred so the highlights
          // survive the position-animation's DOM rebuild.
          applyLastMoveAndCheckDeferred(m.from, m.to);
          setStatus('Your move.', 'info');
        }, 700);
      } else {
        // No-intro path: still surface check on the puzzle's starting
        // position (e.g. mate-in-1 with the user already in check).
        showCheck(chess);
        setStatus('Your move.', 'info');
      }
    }

    function destroyBoard() {
      // chessboard.js v1 has destroy(); be defensive in case it's absent.
      if (board && typeof board.destroy === 'function') {
        try { board.destroy(); } catch (e) { /* ignore */ }
      }
      board = null;
      $('#board').empty();
    }

    function rebuildSearchBoard() {
      destroyBoard();
      var fen = searchFen || 'start';
      // Interactive board: drag pieces of the side-to-move (or click-to-move
      // via onBoardMouseDown) to add a ply to the search position. The same
      // onDragStart/onDrop/onSnapEnd handlers serve drill mode too — they
      // dispatch on the global `mode` flag.
      board = Chessboard('board', {
        position: fen,
        pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
        showNotation: true,
        draggable: true,
        orientation: searchOrientation,
        onDragStart: onDragStart,
        onDrop: onDrop,
        onSnapEnd: onSnapEnd
      });
      // Keep chess.js in sync with what's on the board, so a follow-up
      // Search picks up the same position the user sees.
      chess = new Chess();
      if (searchFen) chess.load(searchFen);
      // Reset transient interaction state — leftover from a prior search-
      // mode interaction or a just-completed drill round trip.
      selectedSquare = null;
      deselectionPending = false;
      lastSuccessfulUserMove = null;
      // Annotation state too (issue #3) — orientation may have changed
      // and the SVG is anchored to the old board's bounding box.
      isRightClicking = false;
      arrowStartSquare = null;
      ghostArrow = null;
      ghostCircle = null;
      ghostCircleWasColor = null;
      clearAnnotations();
      // Surface the most recently played move (if any) and check status,
      // so e.g. coming back from drill with 1.e4 e5 played still shows the
      // green ply highlight. Deferred so chessboard.js has finished
      // re-rendering the squares before we add classes.
      var last = searchMoveHistory.length
        ? searchMoveHistory[searchMoveHistory.length - 1] : null;
      if (last) {
        applyLastMoveAndCheckDeferred(last.from, last.to);
      } else {
        clearLastMove();
        showCheckDeferred(chess);
      }
      updateMoveListDisplay();
      updateFenInputFromBoard();
    }

    // ─── drag/drop handlers ─────────────────────────────────────────────
    // chessboard.js calls these in BOTH search and drill modes. onDragStart
    // filters illegal grabs; onDrop validates + classifies; onSnapEnd syncs
    // the board to chess.js (covers castling/EP/promotion glyphs) and
    // schedules the opp auto-reply (drill mode only — no-op in search).
    function onDragStart(source, piece /*, position, orientation */) {
      // Search mode: any side-to-move piece is draggable. No drillState,
      // no userColor, no completion gating — just legality.
      if (mode === 'search') {
        if (chess.turn() !== piece[0]) return false;
        if (selectedSquare !== source) clearSelection();
        selectSquare(source);
        return true;
      }
      // Drill mode (existing behavior): user's color only, while it's
      // their turn, and only before completion.
      if (!drillState || drillState.complete) return false;
      // Only the side-to-move's pieces are draggable.
      if (chess.turn() !== piece[0]) return false;
      // Block grabs while it's the opponent's turn (during the 400ms
      // window between user move and scheduled opp reply, chess.turn()
      // is opponent's color, so this guards naturally).
      if (chess.turn() !== Drill.userColor(drillState)) return false;
      // Re-select the source so legal-move dots stay visible during
      // the drag (matching MistakeLab's onDragStart pattern).
      // NOTE: do NOT reset deselectionPending here. chessboard.js calls
      // onDragStart on every mousedown (not only on real drags), so
      // clearing it would stomp the click-on-already-selected intent
      // before mouseup gets to act on it. MistakeLab clears it later,
      // inside onDrop, only after a real source!==target drop.
      if (selectedSquare !== source) clearSelection();
      selectSquare(source);
      return true;
    }

    function onDrop(source, target) {
      // Click-without-drag (chessboard.js fires onDrop with source===target
      // for a click that didn't move). Honor pending deselect.
      if (source === target) {
        if (deselectionPending) { deselectionPending = false; clearSelection(); }
        return 'snapback';
      }
      var r = attemptMove(source, target);
      if (!r.ok || r.wrong) return 'snapback';
      // continue / complete: chessboard.js animates the piece into place;
      // onSnapEnd syncs the board, paints lastmove + check, schedules opp.
      return; // undefined → keep
    }

    // ─── shared move-attempt core ───────────────────────────────────────
    // Used by both onDrop (drag) and onBoardMouseDown (click). Dispatches
    // on `mode` — drill mode runs the Drill state machine and SRS, search
    // mode just appends to searchMoveHistory.
    //
    // Returns (drill mode):
    //   { ok: false }                    — chess.js rejected (illegal)
    //   { ok: true, wrong: true }        — Drill said wrong; chess.js reverted
    //   { ok: true, from, to }           — continue or complete
    // Returns (search mode):
    //   { ok: false }                    — chess.js rejected (illegal)
    //   { ok: true, from, to }           — legal move applied
    function attemptMove(source, target) {
      if (mode === 'search') return attemptSearchMove(source, target);
      // Drill-mode side effects:
      //   - chess.js advanced (continue/complete) or reverted (wrong)
      //   - drillState updated via the state machine
      //   - Progress.recordReview on first-wrong + completion
      //   - pendingOppReply / pendingCompletionResult set
      //   - lastSuccessfulUserMove set on continue/complete
      //   - selection cleared (success path)
      //   - square-wrong flash on wrong-move target
      if (!drillState || drillState.complete) return { ok: false };
      if (source === target) return { ok: false };

      // Clear any lingering wrong-X badge from a previous attempt — this
      // attempt either lands on a different square (no badge needed) or
      // lands on the same square (re-painted below if still wrong). Done
      // before chess.move so an illegal-move return path also clears it.
      clearWrongX();

      // Default to queen-promotion. Under-promotions aren't reachable via
      // drag-drop in MVP — a puzzle solution requiring e.g. e8=N marks
      // the user wrong on first try (Again). Acceptable trade-off;
      // promotion-picker UI is a future enhancement.
      var moveObj;
      try {
        moveObj = chess.move({ from: source, to: target, promotion: 'q' });
      } catch (e) {
        moveObj = null;  // chess.js v0.10 returns null; v1+ throws — guard both
      }
      // Clear selection regardless of move outcome. Matches MistakeLab's
      // onDrop pattern (line ~12907): clearSelection is called whether
      // chess.move returns null (illegal) or a move (legal). Doing it
      // here covers all caller paths — drag and click — without each
      // having to remember.
      clearSelection();
      if (!moveObj) return { ok: false };

      var uci = moveObj.from + moveObj.to + (moveObj.promotion || '');
      var result = Drill.attemptUserMove(drillState, uci);
      drillState = result.state;

      if (result.result === 'wrong') {
        // First wrong locks Again — record now (subsequent wrongs return
        // toRecord=null, the state machine handles the lock).
        if (result.toRecord !== null) {
          Progress.recordReview(drillState.puzzleId, result.toRecord);
          // First-wrong reschedules to tomorrow → drops out of today's
          // due count → header badge needs to reflect that.
          refreshReviewBadge();
        }
        chess.undo();              // revert the wrong move on chess.js
        flashWrong(target);        // transient red wash (650ms fade)
        paintWrongX(target);       // persistent X badge until next attempt
        setStatus('Not the move — try again.', 'warn');
        return { ok: true, wrong: true };
      }

      // Correct: clear hint, queue opp reply if any, mark the move so
      // onSnapEnd (drag) or the click handler can paint lastmove.
      clearHintHighlight();
      lastSuccessfulUserMove = { from: moveObj.from, to: moveObj.to };

      if (result.result === 'continue') {
        pendingOppReply = result.opponentReply;
        setStatus('Good — opponent replies…', 'info');
      } else if (result.result === 'complete') {
        if (result.opponentReply) {
          // Edge: even-length solutionUci means opp has the last move.
          // Queue it and defer completion UI until after the animation.
          pendingOppReply = result.opponentReply;
          pendingCompletionResult = result;
          setStatus('Good — final reply…', 'info');
        } else {
          pendingOppReply = null;
          handleCompletion(result);
        }
      }
      return { ok: true, from: moveObj.from, to: moveObj.to };
    }

    // ─── search-mode move-attempt ───────────────────────────────────────
    // Adds one ply to the move builder. Side effects:
    //   - chess.js advanced
    //   - searchMoveHistory pushed
    //   - searchFen updated to chess.fen()
    //   - lastSuccessfulUserMove set (consumed by onSnapEnd or the click handler)
    //   - selection cleared
    //   - move list + FEN textarea re-rendered
    //   - any stale results cleared (the position changed)
    function attemptSearchMove(source, target) {
      if (source === target) return { ok: false };
      // Default to queen-promotion (same MVP trade-off as drill mode — under-
      // promotion picker is future work). chess.js v0.10 returns null;
      // v1+ throws — guard both.
      var moveObj;
      try {
        moveObj = chess.move({ from: source, to: target, promotion: 'q' });
      } catch (e) {
        moveObj = null;
      }
      clearSelection();
      if (!moveObj) return { ok: false };
      searchMoveHistory.push({
        san: moveObj.san,
        from: moveObj.from,
        to: moveObj.to
      });
      searchFen = chess.fen();
      lastSuccessfulUserMove = { from: moveObj.from, to: moveObj.to };
      updateMoveListDisplay();
      updateFenInputFromBoard();
      // Position changed — drop any stale results from a previous Search,
      // both from the DOM and from the lastMatches cache (otherwise back-
      // from-drill would re-render results that don't match the current
      // board). Hide the session panel too — its slider/counts are tied
      // to lastMatches. Don't auto-search; user clicks Search when ready.
      $('#results').empty();
      $('#resultsMeta').hide();
      $('#sessionPanel').hide();
      lastMatches = null;
      setStatus('Position updated. Click Search.', 'info');
      return { ok: true, from: moveObj.from, to: moveObj.to };
    }

    // ─── search-mode UI helpers ─────────────────────────────────────────
    // Render the move history into #moveList as "1. e4 e5 2. Nf3 …".
    // Empty list → italicized "starting position" placeholder.
    // Undo is enabled iff we have history. Reset is enabled iff the board
    // is NOT at the default start state — covers both move-builder usage
    // (history > 0) and pasted-FEN usage (history empty but searchFen set).
    function updateMoveListDisplay() {
      var $el = $('#moveList');
      $('#undoBtn').prop('disabled', searchMoveHistory.length === 0);
      $('#resetBtn').prop('disabled', searchFen === null && searchMoveHistory.length === 0);
      if (!searchMoveHistory.length) {
        $el.addClass('empty').text('starting position');
        return;
      }
      $el.removeClass('empty').empty();
      // Group plies into move pairs. searchMoveHistory[0] is white's first
      // move — history is only built from the standard start position
      // (paste clears it), so this assumption holds.
      for (var i = 0; i < searchMoveHistory.length; i++) {
        if (i % 2 === 0) {
          $el.append($('<span class="move-num"></span>').text((i / 2 + 1) + '.'));
        }
        $el.append($('<span class="move-san"></span>').text(searchMoveHistory[i].san));
      }
    }

    // Reflect the current chess.js position into the FEN textarea so the
    // user can copy/paste it elsewhere. Skipped if the textarea is focused
    // (mid-paste/edit) so we don't stomp on user input. searchFen mirrors
    // chess.fen() so we use it directly.
    function updateFenInputFromBoard() {
      var $input = $('#fenInput');
      if ($input.is(':focus')) return;
      $input.val(searchFen || (chess ? chess.fen() : ''));
    }

    // Undo: pop the last ply, revert chess.js, repaint the prior ply's
    // lastmove highlight (if any), invalidate cached results.
    function undoSearchMove() {
      if (mode !== 'search') return;
      if (!searchMoveHistory.length) return;
      // Cancel any in-flight selection — the destination from a half-
      // started click no longer makes sense after the undo.
      clearSelection();
      deselectionPending = false;
      lastSuccessfulUserMove = null;
      searchMoveHistory.pop();
      chess.undo();
      // When we've popped back to the standard start position, restore
      // searchFen to null. This keeps the Reset button's disabled-state
      // condition (`searchFen===null && history.length===0`) honest: the
      // default state has BOTH null. Pasted-FEN-with-no-moves ALSO has
      // history empty, but in that case searchFen is the pasted FEN
      // (non-null), so Reset stays enabled — exactly what we want.
      searchFen = searchMoveHistory.length === 0 ? null : chess.fen();
      if (board) board.position(chess.fen());  // animated
      updateMoveListDisplay();
      updateFenInputFromBoard();
      // Paint the now-current lastmove (the ply BEFORE the one we undid),
      // or clear if we're back at the start.
      var prev = searchMoveHistory.length
        ? searchMoveHistory[searchMoveHistory.length - 1] : null;
      if (prev) {
        applyLastMoveAndCheckDeferred(prev.from, prev.to);
      } else {
        clearLastMove();
        showCheckDeferred(chess);
      }
      $('#results').empty();
      $('#resultsMeta').hide();
      $('#sessionPanel').hide();
      lastMatches = null;
      setStatus('Undid last move. Click Search.', 'info');
    }

    // Reset to the standard start position. Clears history and any
    // cached results; re-syncs FEN textarea via updateFenInputFromBoard
    // so it reflects the current board (start FEN) — consistent with
    // every other path that updates the textarea.
    function resetSearchPosition() {
      if (mode !== 'search') return;
      clearSelection();
      deselectionPending = false;
      lastSuccessfulUserMove = null;
      searchMoveHistory = [];
      searchFen = null;
      chess = new Chess();
      // Teleport — matches the project convention for multi-piece position
      // swaps (applyFen does the same). chessboard.js's animation looks
      // chaotic when many pieces shift at once.
      if (board) board.position('start', false);
      clearLastMove();
      clearCheck();
      updateMoveListDisplay();
      updateFenInputFromBoard();
      $('#results').empty();
      $('#resultsMeta').hide();
      $('#sessionPanel').hide();
      lastMatches = null;
      setStatus('Reset to start position. Drag pieces or paste a FEN.', 'info');
    }

    // Flip board orientation. Persisted in searchOrientation so subsequent
    // rebuilds (e.g. back from drill) preserve the user's choice. We
    // rebuild rather than calling board.flip() because chessboard.js v1's
    // flip() doesn't re-trigger our own deferred lastmove repainting; a
    // full rebuild is cheap (no fetches) and uses the existing code path.
    function flipSearchBoard() {
      if (mode !== 'search') return;
      searchOrientation = (searchOrientation === 'white') ? 'black' : 'white';
      rebuildSearchBoard();
      // Flipping changes the perspective — with matchOwnColorOnly=true
      // that's the filter input, so cached results from before the flip
      // are now wrong-color. Same invalidation pattern as every other
      // state-changing handler (toggleColorFilter, applyFen, etc). Even
      // when the filter is OFF, dropping the cache keeps the UX model
      // consistent: any state change → results stale → click Search.
      $('#results').empty();
      $('#resultsMeta').hide();
      $('#sessionPanel').hide();
      lastMatches = null;
      setStatus('Flipped to ' + searchOrientation + '. Click Search' +
        (matchOwnColorOnly ? ' for puzzles where ' +
          (searchOrientation === 'white' ? 'white' : 'black') + ' moves.' : '.'),
        'info');
    }

    // Toggle the color-of-perspective filter. Like Flip, this doesn't auto-
    // re-search — the user clicks Search to apply it. We DO clear cached
    // results (lastMatches + DOM) because they reflect the previous filter
    // setting and would re-render through onBackClick with stale content.
    function toggleColorFilter() {
      if (mode !== 'search') return;
      matchOwnColorOnly = !matchOwnColorOnly;
      updateColorFilterBtn();
      $('#results').empty();
      $('#resultsMeta').hide();
      $('#sessionPanel').hide();
      lastMatches = null;
      setStatus(matchOwnColorOnly
        ? 'Filtering to your color only. Click Search.'
        : 'Showing puzzles for both colors. Click Search.', 'info');
    }

    // Sync the color-filter button's label + active class to state.
    function updateColorFilterBtn() {
      var $btn = $('#colorFilterBtn');
      if (matchOwnColorOnly) {
        $btn.addClass('active').text('My color only');
      } else {
        $btn.removeClass('active').text('All colors');
      }
    }

    // Filter a freshly-fetched matches array by the perspective rule.
    // Returns a NEW array. Entries without m[2] (legacy data, pre-color
    // build) are passed through — defensive fallback so the frontend
    // works against the live 50K dataset before it's republished with
    // the new schema.
    function filterByPerspective(matches) {
      if (!matchOwnColorOnly) return matches.slice();
      var perspective = (searchOrientation === 'black') ? 'b' : 'w';
      return matches.filter(function (m) {
        return m[2] === undefined || m[2] === perspective;
      });
    }

    function onSnapEnd() {
      // ALWAYS animate:false here per project conventions (teleport
      // artifact rule). Castling rook, EP capture, promotion glyph all
      // get reconciled by chess.js's resulting FEN.
      if (board) board.position(chess.fen(), false);
      // Paint the just-played user move's lastmove + check highlights.
      // Deferred re-apply at +250ms guards against any animation
      // completion that wipes DOM classes.
      if (lastSuccessfulUserMove) {
        applyLastMoveAndCheckDeferred(lastSuccessfulUserMove.from, lastSuccessfulUserMove.to);
        lastSuccessfulUserMove = null;
      }
      scheduleOppReplyIfPending();
    }

    // Schedule the queued opp reply with a 400ms 'thinking' delay. Called
    // from both onSnapEnd (drag path) and the click-to-move handler (no
    // onSnapEnd fires for board.position calls). NO `!drillState.complete`
    // guard — even-length puzzles set drillState.complete=true AND
    // pendingOppReply (opp gets the last move); we want to play it.
    function scheduleOppReplyIfPending() {
      if (!pendingOppReply || !drillState) return;
      var oppMove = pendingOppReply;
      pendingOppReply = null;
      oppReplyTimeout = setTimeout(function () {
        oppReplyTimeout = null;
        playOppReply(oppMove);
      }, 400);
    }

    function playOppReply(uci) {
      // mode could have changed (user clicked back). Safety check.
      if (mode !== 'drill' || !drillState) return;
      var from = uci.slice(0, 2);
      var to = uci.slice(2, 4);
      var promotion = uci[4] || undefined;
      var moveObj;
      try {
        moveObj = chess.move({ from: from, to: to, promotion: promotion });
      } catch (e) {
        moveObj = null;
      }
      if (!moveObj) {
